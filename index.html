<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>タクシー記録</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background: #f7fbfd;
}

.container {
  max-width: 420px;
  margin: 0 auto;
  padding: 20px;
}

button {
  width: 100%;
  padding: 22px;
  margin-bottom: 14px;
  font-size: 20px;
  border-radius: 14px;
  border: none;
  background: #cfd8dc;
  color: #333;
  transition: 0.2s;
}

button.active {
  background: #5da9e9;
  color: #fff;
  font-weight: bold;
}

button.sub {
  background: #e5edf1;
}

input {
  width: 100%;
  padding: 20px;
  font-size: 22px;
  margin-bottom: 14px;
  border-radius: 12px;
  border: 1px solid #ccc;
  text-align: center;
}

.hidden {
  display: none;
}
</style>
</head>

<body>

<div class="container">

  <!-- 乗車 -->
  <button id="rideBtn" class="active">乗車</button>

  <!-- 降車 -->
  <button id="dropBtn" class="sub">降車</button>

  <!-- 金額入力 -->
  <input id="priceInput" class="hidden" placeholder="金額入力">

  <!-- 保存 -->
  <button id="saveBtn" class="sub">保存</button>

</div>

<script>
let state = "idle";

const rideBtn = document.getElementById("rideBtn");
const dropBtn = document.getElementById("dropBtn");
const saveBtn = document.getElementById("saveBtn");
const priceInput = document.getElementById("priceInput");

// 状態更新
function updateUI() {

  rideBtn.classList.remove("active");
  dropBtn.classList.remove("active");
  saveBtn.classList.remove("active");
  priceInput.classList.add("hidden");

  if (state === "idle") {
    rideBtn.classList.add("active");
  }

  if (state === "riding") {
    dropBtn.classList.add("active");
  }

  if (state === "after_drop") {
    priceInput.classList.remove("hidden");
    saveBtn.classList.add("active");
  }
}

// 乗車
rideBtn.onclick = () => {
  state = "riding";
  updateUI();
};

// 降車
dropBtn.onclick = () => {
  state = "after_drop";
  updateUI();
};

// 保存
saveBtn.onclick = () => {
  alert("保存（仮）");
  state = "idle";
  priceInput.value = "";
  updateUI();
};

// 初期表示
updateUI();
</script>

</body>
</html>

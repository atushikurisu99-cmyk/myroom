<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>タクシー記録</title>

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  background: #eef2f4;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}

/* 全体を少し下に */
.wrap {
  max-width: 430px;
  margin: 0 auto;
  padding: 40px 18px 40px;
}

.panel {
  background: #e3e7ea;
  border-radius: 14px;
  padding: 20px;
  min-height: 70vh;
}

/* ボタン */
.btn {
  width: 100%;
  padding: 30px;
  margin-bottom: 16px;
  font-size: 24px;
  border-radius: 20px;
  border: 1px solid #b8c2c9;
  background: #e9eef1;
  color: #666;
  font-weight: bold;
  transition: 0.2s;
}

/* 強調 */
.ride.active {
  background: #6ea8e5;
  color: #fff;
}

.drop.active {
  background: #12b84f;
  color: #111;
}

.save.active {
  background: #ea7a2f;
  color: #111;
}

/* 入力エリア */
.price-wrap {
  display: none;
  margin-bottom: 16px;
  position: relative;
}

.price-wrap.show {
  display: block;
}

/* 入力 */
.price-input {
  width: 100%;
  padding: 28px;
  font-size: 28px;
  text-align: center;
  border-radius: 20px;
  border: 1px solid #b8c2c9;
  background: #f7f8f9;
  font-weight: bold;
}

/* 円表示 */
.yen {
  position: absolute;
  right: 20px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 20px;
  color: #888;
}

/* 下テキスト */
.hint {
  text-align: center;
  margin-top: 10px;
  color: #7b858d;
  font-size: 14px;
}
</style>
</head>

<body>

<div class="wrap">
  <div class="panel">

    <button id="rideBtn" class="btn ride">乗車</button>
    <button id="dropBtn" class="btn drop">降車</button>

    <div id="priceWrap" class="price-wrap">
      <input id="priceInput" class="price-input"
        type="tel"
        inputmode="numeric"
        placeholder="金額入力">
      <span class="yen">円</span>
    </div>

    <button id="saveBtn" class="btn save">保存</button>

    <div id="hint" class="hint">乗車を押してください</div>

  </div>
</div>

<script>
let state = "idle";

const rideBtn = document.getElementById("rideBtn");
const dropBtn = document.getElementById("dropBtn");
const saveBtn = document.getElementById("saveBtn");
const priceWrap = document.getElementById("priceWrap");
const priceInput = document.getElementById("priceInput");
const hint = document.getElementById("hint");

function reset() {
  rideBtn.classList.remove("active");
  dropBtn.classList.remove("active");
  saveBtn.classList.remove("active");
  priceWrap.classList.remove("show");
}

function updateUI() {
  reset();

  if (state === "idle") {
    rideBtn.classList.add("active");
    hint.textContent = "乗車を押してください";
  }

  if (state === "riding") {
    dropBtn.classList.add("active");
    hint.textContent = "降車を押してください";
  }

  if (state === "after_drop") {
    priceWrap.classList.add("show");

    if (priceInput.value !== "") {
      saveBtn.classList.add("active");
      hint.textContent = "保存を押してください";
    } else {
      hint.textContent = "金額を入力してください";
    }

    setTimeout(() => priceInput.focus(), 100);
  }
}

/* 乗車 */
rideBtn.onclick = () => {
  if (state !== "idle") return;
  state = "riding";
  updateUI();
};

/* 降車 */
dropBtn.onclick = () => {
  if (state !== "riding") return;
  state = "after_drop";
  updateUI();
};

/* 入力 */
priceInput.addEventListener("input", () => {
  priceInput.value = priceInput.value.replace(/[^\d]/g, "");
  updateUI();
});

/* 保存 */
saveBtn.onclick = () => {
  if (state !== "after_drop") return;
  if (priceInput.value === "") return;

  alert(`保存（仮）: ${priceInput.value}円`);

  state = "idle";
  priceInput.value = "";
  updateUI();
};

updateUI();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Taxi UI</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: #f5f6f8;
}

/* 全体 */
.container {
  padding: 16px;
}

/* 状態カード（高さ固定） */
.status-card {
  height: 120px; /* ←統一 */
  background: #fff;
  border-radius: 16px;
  padding: 16px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.05);
  margin-bottom: 16px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
}

/* メインボタン（位置固定エリア） */
.main-area {
  height: 140px;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* メインボタン */
.main-button {
  width: 100%;
  height: 100px;
  border-radius: 20px;
  font-size: 24px;
  border: none;
  color: #fff;
}

/* 状態別 */
.blue { background: #4aa3df; }
.green { background: #4caf50; }

/* サブボタン */
.sub-area {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.sub-button {
  height: 56px;
  border-radius: 14px;
  border: none;
  font-size: 16px;
  background: #e0e0e0;
}

/* 金額入力 */
.input-box {
  width: 100%;
  height: 70px;
  font-size: 28px;
  border-radius: 12px;
  border: 2px solid #ccc;
  padding: 0 12px;
  margin-bottom: 12px;
}

/* 確定ボタン */
.confirm {
  background: #000;
  color: #fff;
  height: 60px;
  border-radius: 12px;
  font-size: 18px;
  margin-bottom: 12px;
}

/* 支払いボタン */
.pay-btn {
  height: 60px;
  border-radius: 12px;
  font-size: 18px;
  border: none;
  color: #fff;
}

/* 有効 */
.cash { background: #4aa3df; }
.card { background: #2ecc71; }
.receipt { background: #f1c40f; color:#000; }

/* 無効状態 */
.disabled {
  background: #ccc !important;
  color: #888 !important;
  pointer-events: none;
}
</style>
</head>

<body>

<div class="container">

  <!-- 状態カード -->
  <div class="status-card">
    <div>乗車待機</div>
    <div>現在時刻 17:23</div>
    <div>乗務合計 ¥0</div>
  </div>

  <!-- メインボタン -->
  <div class="main-area">
    <button class="main-button blue">乗車</button>
  </div>

  <!-- サブ -->
  <div class="sub-area">
    <button class="sub-button">分析</button>
    <button class="sub-button">設定</button>
  </div>

  <hr style="margin:24px 0">

  <!-- 金額入力 -->
  <input type="number" id="amount" class="input-box" placeholder="¥ 0">

  <button class="confirm" onclick="confirmAmount()">金額確定</button>

  <!-- 支払い -->
  <button id="cash" class="pay-btn cash disabled">現金</button>
  <button id="card" class="pay-btn card disabled">カード・QR</button>
  <button id="receipt" class="pay-btn receipt disabled">領収証発行</button>

</div>

<script>
function confirmAmount() {
  const val = document.getElementById("amount").value;

  if (!val || val <= 0) {
    alert("金額を入力してください");
    return;
  }

  // キーボード閉じる
  document.getElementById("amount").blur();

  // ボタン有効化
  document.getElementById("cash").classList.remove("disabled");
  document.getElementById("card").classList.remove("disabled");
  document.getElementById("receipt").classList.remove("disabled");
}
</script>

</body>
</html>

<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no"
  />
  <title>Taxi UI Fixed Lines</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    html,
    body,
    #root {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #dfe5ee;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Sans",
        "Hiragino Kaku Gothic ProN", "Yu Gothic", Meiryo, sans-serif;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    button,
    input {
      font: inherit;
    }

    .hide-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    .hide-scrollbar::-webkit-scrollbar {
      display: none;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useEffect, useMemo, useState } = React;

    const COLORS = {
      bg: "#dfe5ee",
      green: "#32CD32",
      navActive: "#33CC6D",
      card: "#f8fafc",
      text: "#1f2a44",
      sub: "#7a869f",
      good: "#28a26b",
    };

    const LAYOUT = {
      shellW: 430,
      navH: 112,

      // 採用済み固定値
      side: 20,
      line1ClockTop: 40,
      line2HeaderBottom: 202,
      line3ButtonTop: 252,
      line4ButtonBottom: 394,
      line5GreenBottom: 419,
      line6ContentTop: 444,

      headerH: 182,
      buttonH: 142,
      contentPlaceholderH: 124,
    };

    function Clock({ color = "#1f2a44" }) {
      const [now, setNow] = useState(new Date());

      useEffect(() => {
        const id = setInterval(() => setNow(new Date()), 1000);
        return () => clearInterval(id);
      }, []);

      const hh = String(now.getHours()).padStart(2, "0");
      const mm = String(now.getMinutes()).padStart(2, "0");

      return (
        <div
          style={{ color, fontSize: "68px" }}
          className="font-black tracking-[-0.05em] leading-none"
        >
          {hh}：{mm}
        </div>
      );
    }

    function EyeIcon() {
      return (
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path
            d="M2.2 12C4.1 8.7 7.7 6.6 12 6.6C16.3 6.6 19.9 8.7 21.8 12C19.9 15.3 16.3 17.4 12 17.4C7.7 17.4 4.1 15.3 2.2 12Z"
            stroke="white"
            strokeWidth="1.8"
          />
          <circle cx="12" cy="12" r="3.1" fill="white" />
        </svg>
      );
    }

    function HomeIcon() {
      return (
        <svg width="30" height="30" viewBox="0 0 64 64" fill="none" aria-hidden="true">
          <path
            d="M12 29.5L32 12L52 29.5"
            stroke="white"
            strokeWidth="5"
            strokeLinecap="round"
            strokeLinejoin="round"
          />
          <path d="M19 28.5V51H29V39H35V51H45V28.5" fill="white" />
        </svg>
      );
    }

    function GridIcon() {
      const dots = [10, 24, 38];
      return (
        <svg width="24" height="24" viewBox="0 0 48 48" fill="none" aria-hidden="true">
          {dots.map((x) =>
            dots.map((y) => (
              <circle key={`${x}-${y}`} cx={x} cy={y} r="3.2" fill="white" />
            ))
          )}
        </svg>
      );
    }

    function WeatherBlock({ hidden = false }) {
      return (
        <div className={`flex gap-6 items-start ${hidden ? "opacity-0 pointer-events-none" : ""}`}>
          <div>
            <div className="text-[12px] font-semibold text-[#7a869f] leading-none">4/11</div>
            <div className="mt-2 text-[26px] leading-none">🌞</div>
          </div>
          <div>
            <div className="text-[12px] font-semibold text-[#7a869f] leading-none">4/12</div>
            <div className="mt-2 text-[26px] leading-none">🌤️</div>
          </div>
        </div>
      );
    }

    function HeaderZone({ screen = "top" }) {
      const headerTop = LAYOUT.line2HeaderBottom - LAYOUT.headerH;
      const clockTopInside = LAYOUT.line1ClockTop - headerTop;
      const isTop = screen === "top";

      return (
        <div
          className="absolute"
          style={{
            left: `${LAYOUT.side}px`,
            right: `${LAYOUT.side}px`,
            top: `${headerTop}px`,
            height: `${LAYOUT.headerH}px`,
          }}
        >
          {isTop ? (
            <div className="relative h-full">
              <div className="absolute left-0 top-0">
                <WeatherBlock hidden={true} />
              </div>

              <div className="absolute left-0 right-0 bottom-0 flex items-start justify-between gap-3">
                <div>
                  <div className="text-[15px] font-semibold text-white leading-none">当月達成売上</div>
                  <div className="mt-3 text-[26px] font-black text-white leading-none">¥0</div>
                </div>
                <div className="pt-[18px]">
                  <EyeIcon />
                </div>
              </div>
            </div>
          ) : (
            <div className="relative h-full rounded-[34px] bg-[#f8fafc] shadow-[0_8px_22px_rgba(0,0,0,0.08)] px-5 pt-5 pb-4">
              <div className="absolute left-5 top-5">
                <WeatherBlock />
              </div>

              <div className="absolute left-5 right-5 bottom-4">
                <div className="text-[14px] font-semibold text-[#6e7a93]">今日のペース</div>
                <div className="mt-1 text-[16px] font-bold text-[#28a26b] leading-none">良好</div>
              </div>
            </div>
          )}

          <div
            className="absolute right-0"
            style={{ top: `${clockTopInside}px` }}
          >
            <Clock color={isTop ? "#ffffff" : "#1f2a44"} />
          </div>
        </div>
      );
    }

    function MainButton({ label, type = "start", onClick }) {
      const bg =
        type === "start"
          ? "linear-gradient(180deg,#86e0b2 0%, #6dbb99 42%, #50937c 100%)"
          : type === "standby"
          ? "linear-gradient(180deg,#88c8f5 0%, #5b9bf0 44%, #3c73d8 100%)"
          : "linear-gradient(180deg,#f5d85e 0%, #ecb63c 42%, #d49326 100%)";

      return (
        <button
          type="button"
          onClick={onClick}
          className="relative w-full rounded-[32px] text-white overflow-hidden shadow-[0_10px_22px_rgba(0,0,0,0.14)]"
          style={{ height: `${LAYOUT.buttonH}px`, background: bg }}
        >
          <div className="absolute left-[18px] right-[18px] top-[10px] h-[54px] rounded-[28px] bg-[rgba(255,255,255,0.28)]"></div>
          <div className="absolute inset-0 flex items-center justify-center">
            <span className="text-[34px] font-black tracking-[-0.03em]">{label}</span>
          </div>
        </button>
      );
    }

    function GraphCard({ title, sub }) {
      return (
        <div className="h-[118px] rounded-[28px] bg-[rgba(248,250,252,0.56)] px-4 py-4 border border-[rgba(255,255,255,0.14)] overflow-hidden">
          <div className="text-[18px] font-black text-[#445673]">{title}</div>
          <div className="mt-1 text-[12px] font-semibold text-[#98a6bc]">{sub}</div>
        </div>
      );
    }

    function TopGraphArea() {
      return (
        <div className="grid grid-cols-2 gap-x-[14px] gap-y-[16px]">
          <GraphCard title="売上" sub="グラフ" />
          <GraphCard title="本数" sub="推移" />
          <GraphCard title="時間帯" sub="動き" />
          <GraphCard title="分析" sub="入口" />
        </div>
      );
    }

    function RideInfoCard() {
      return (
        <div className="rounded-[28px] bg-[#f8fafc] px-5 py-4 shadow-[0_8px_22px_rgba(0,0,0,0.08)] h-[124px]">
          <div className="text-[18px] font-black text-[#1f2a44]">取得中...</div>

          <div className="mt-4 flex justify-between items-end gap-4">
            <div>
              <div className="text-[12px] font-semibold text-[#6e7a93]">乗車時刻</div>
              <div className="mt-1 text-[18px] font-black text-[#1f2a44] leading-none">05:45</div>
            </div>
            <div className="text-right">
              <div className="text-[12px] font-semibold text-[#6e7a93]">経過時間</div>
              <div className="mt-1 text-[18px] font-black text-[#1f2a44] leading-none">0分</div>
            </div>
          </div>
        </div>
      );
    }

    function FareInfoTop() {
      return (
        <div className="rounded-[28px] bg-white px-5 py-4 shadow-[0_8px_22px_rgba(0,0,0,0.08)]">
          <div className="grid grid-cols-[1fr_auto_1fr] gap-4 items-start">
            <div>
              <div className="text-[16px] font-black text-slate-800">05:45</div>
              <div className="mt-2 text-[14px] font-bold text-slate-700">船越南三丁目</div>
              <div className="mt-1 text-[12px] font-semibold text-slate-400">精度：55m</div>
            </div>
            <div className="pt-[6px] text-[22px] text-slate-300">→</div>
            <div className="text-right">
              <div className="text-[16px] font-black text-slate-800">05:45</div>
              <div className="mt-2 text-[14px] font-bold text-slate-700">船越南三丁目</div>
              <div className="mt-1 text-[12px] font-semibold text-slate-400">精度：55m</div>
            </div>
          </div>
        </div>
      );
    }

    function FareAmountCard() {
      return (
        <div className="rounded-[28px] bg-white px-5 py-4 shadow-[0_8px_22px_rgba(0,0,0,0.08)]">
          <div className="flex items-center justify-between gap-4">
            <div className="text-[16px] text-slate-400">¥</div>
            <div className="flex-1 text-[34px] leading-none font-black tracking-[-0.04em] text-slate-800">
              1,200
            </div>
            <div className="text-right">
              <div className="text-[12px] font-semibold text-slate-400">乗車人員</div>
              <div className="mt-1 flex items-end gap-1 justify-end">
                <span className="text-[12px] font-semibold text-slate-400">1</span>
                <span className="text-[12px] font-semibold text-slate-400">名</span>
              </div>
            </div>
          </div>
        </div>
      );
    }

    function PassengerDots() {
      const items = [1, 2, 3, 4];
      return (
        <div className="flex gap-4">
          {items.map((n) => {
            const selected = n === 1;
            return (
              <button
                key={n}
                type="button"
                className="w-[62px] h-[62px] rounded-full text-[28px] font-black"
                style={{
                  background: selected ? "#8e968f" : "#ece8ea",
                  color: selected ? "#ffffff" : "#6e6e73",
                }}
              >
                {n}
              </button>
            );
          })}
        </div>
      );
    }

    function PayButton({ label, bg, color = "#111827" }) {
      return (
        <button
          type="button"
          className="w-full h-[72px] rounded-[24px] text-[22px] font-bold shadow-[0_8px_16px_rgba(0,0,0,0.14)]"
          style={{ background: bg, color }}
        >
          {label}
        </button>
      );
    }

    function BottomNav({ active = "home", centerLabel = "履歴" }) {
      const activeLeft =
        active === "home" ? "16.6667%" : active === "center" ? "50%" : "83.3333%";

      return (
        <div
          className="absolute left-0 right-0 bottom-0"
          style={{ height: `${LAYOUT.navH}px` }}
        >
          <div
            className="absolute left-0 right-0 bottom-0 h-[70px] rounded-t-[26px]"
            style={{ background: COLORS.green }}
          />
          <div
            className="absolute top-[8px] w-[92px] h-[92px] rounded-full"
            style={{
              left: activeLeft,
              transform: "translateX(-50%)",
              background: COLORS.navActive,
            }}
          />
          <div className="absolute inset-0 grid grid-cols-3">
            <div className="relative">
              <div className="absolute left-1/2 top-[26px] -translate-x-1/2 flex flex-col items-center">
                <HomeIcon />
                <div className="mt-[7px] text-[11px] font-bold text-white whitespace-nowrap">
                  ホーム
                </div>
              </div>
            </div>
            <div className="relative">
              <div className="absolute left-1/2 top-[38px] -translate-x-1/2 text-[16px] font-black tracking-[0.03em] text-white whitespace-nowrap">
                {centerLabel}
              </div>
            </div>
            <div className="relative">
              <div className="absolute left-1/2 top-[28px] -translate-x-1/2 flex flex-col items-center">
                <GridIcon />
                <div className="mt-[8px] text-[11px] font-bold text-white whitespace-nowrap">
                  メニュー
                </div>
              </div>
            </div>
          </div>
        </div>
      );
    }

    function FixedLinesLayout({
      screen,
      buttonLabel,
      buttonType,
      onAdvance,
      centerLabel,
      navActive,
      content,
      showArrow = false,
    }) {
      return (
        <div className="absolute inset-0 bg-[#dfe5ee] overflow-hidden">
          <div
            className="absolute inset-x-0 top-0 bg-[#32CD32]"
            style={{ height: `${LAYOUT.line5GreenBottom}px` }}
          />

          <HeaderZone screen={screen} />

          <div
            className="absolute"
            style={{
              left: `${LAYOUT.side}px`,
              right: `${LAYOUT.side}px`,
              top: `${LAYOUT.line3ButtonTop}px`,
              height: `${LAYOUT.buttonH}px`,
            }}
          >
            <MainButton label={buttonLabel} type={buttonType} onClick={onAdvance} />
          </div>

          <div
            className="absolute"
            style={{
              left: `${LAYOUT.side}px`,
              right: `${LAYOUT.side}px`,
              top: `${LAYOUT.line6ContentTop}px`,
            }}
          >
            {content}
          </div>

          {showArrow ? (
            <div className="absolute right-[26px] bottom-[118px] text-[28px] font-black text-[#a7adb7] leading-none">
              ▲
            </div>
          ) : null}

          <BottomNav active={navActive} centerLabel={centerLabel} />
        </div>
      );
    }

    function TopScreen({ onNext }) {
      return (
        <FixedLinesLayout
          screen="top"
          buttonLabel="乗務開始"
          buttonType="start"
          onAdvance={onNext}
          centerLabel="経費"
          navActive="home"
          content={<TopGraphArea />}
          showArrow={true}
        />
      );
    }

    function StandbyScreen({ onNext }) {
      return (
        <FixedLinesLayout
          screen="standby"
          buttonLabel="実車"
          buttonType="standby"
          onAdvance={onNext}
          centerLabel="履歴"
          navActive="center"
          content={<div style={{ height: `${LAYOUT.contentPlaceholderH}px` }} />}
        />
      );
    }

    function RideScreen({ onNext }) {
      return (
        <FixedLinesLayout
          screen="ride"
          buttonLabel="降車"
          buttonType="ride"
          onAdvance={onNext}
          centerLabel="履歴"
          navActive="center"
          content={<RideInfoCard />}
        />
      );
    }

    function FareScreen() {
      return (
        <div className="w-full h-full relative overflow-hidden bg-[#dfe5ee]">
          <div className="relative h-full px-4 pt-4 pb-[26px] overflow-y-auto hide-scrollbar">
            <FareInfoTop />
            <div className="mt-4">
              <FareAmountCard />
            </div>
            <div className="mt-4">
              <PassengerDots />
            </div>
            <div className="mt-5 space-y-4">
              <PayButton label="現金" bg="#4d4df7" color="#111827" />
              <PayButton label="カード・QR" bg="#79e883" color="#111827" />
              <PayButton label="領収証発行" bg="#f0ef47" color="#111827" />
            </div>
          </div>
        </div>
      );
    }

    function App() {
      const [screen, setScreen] = useState("top");

      const view = useMemo(() => {
        if (screen === "top") return <TopScreen onNext={() => setScreen("standby")} />;
        if (screen === "standby") return <StandbyScreen onNext={() => setScreen("ride")} />;
        if (screen === "ride") return <RideScreen onNext={() => setScreen("fare")} />;
        return <FareScreen />;
      }, [screen]);

      return (
        <div className="w-full h-full flex justify-center bg-[#dfe5ee] overflow-hidden">
          <div className="w-full max-w-[430px] h-full relative overflow-hidden">
            {view}
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>

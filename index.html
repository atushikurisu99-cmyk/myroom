<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Taxi Mini App Mock</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body {
      margin: 0;
      background: #f8fafc;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useMemo, useState } = React;

    function App() {
      const [screen, setScreen] = useState("top");
      const [isRiding, setIsRiding] = useState(false);
      const [rideStartAt, setRideStartAt] = useState(null);
      const [rideEndAt, setRideEndAt] = useState(null);
      const [amount, setAmount] = useState("");
      const [receipt, setReceipt] = useState(false);

      const nowText = new Date().toLocaleTimeString("ja-JP", {
        hour: "2-digit",
        minute: "2-digit",
      });

      const elapsedText = rideStartAt
        ? `${Math.floor((Date.now() - rideStartAt.getTime()) / 60000)}分`
        : "0分";

      const startRide = () => {
        setRideStartAt(new Date());
        setIsRiding(true);
        setScreen("ride");
      };

      const dropOff = () => {
        setRideEndAt(new Date());
        setScreen("fare");
      };

      const save = () => {
        setIsRiding(false);
        setScreen("top");
      };

      return (
        <div className="min-h-screen flex items-center justify-center p-4">
          <div className="w-full max-w-sm bg-white rounded-3xl shadow-lg p-5">

            {screen === "top" && (
              <>
                <div className="mb-5">
                  <div className="text-sm text-gray-500">状態</div>
                  <div className="text-2xl font-bold">
                    {isRiding ? "乗車中" : "待機中"}
                  </div>
                  <div className="text-sm text-gray-400">
                    {nowText} {isRiding && `・${elapsedText}`}
                  </div>
                </div>

                <button
                  onClick={isRiding ? () => setScreen("ride") : startRide}
                  className="w-full py-5 rounded-2xl bg-blue-500 text-white font-bold mb-3"
                >
                  {isRiding ? "乗車中へ戻る" : "乗務開始"}
                </button>

                <button className="w-full py-4 rounded-2xl bg-gray-100 mb-2">
                  修正
                </button>
                <button className="w-full py-4 rounded-2xl bg-gray-100 mb-2">
                  分析
                </button>
                <button className="w-full py-4 rounded-2xl bg-gray-100">
                  設定
                </button>
              </>
            )}

            {screen === "ride" && (
              <>
                <div className="mb-6">
                  <div className="text-sm text-gray-500">状態</div>
                  <div className="text-3xl font-bold">乗車中</div>
                  <div className="text-sm text-gray-400">
                    経過 {elapsedText}
                  </div>
                </div>

                <button
                  onClick={dropOff}
                  className="w-full py-10 rounded-3xl bg-green-500 text-white text-3xl font-bold mb-5"
                >
                  降車
                </button>

                <button
                  onClick={() => setScreen("top")}
                  className="w-full py-4 rounded-2xl bg-gray-100"
                >
                  TOP
                </button>
              </>
            )}

            {screen === "fare" && (
              <>
                <div className="mb-4">
                  <div className="text-sm text-gray-500 mb-2">金額</div>
                  <input
                    value={amount}
                    onChange={(e) =>
                      setAmount(e.target.value.replace(/[^\d]/g, ""))
                    }
                    className="w-full text-4xl font-bold border rounded-2xl p-5"
                    placeholder="0"
                  />
                </div>

                <button
                  onClick={() => setReceipt(!receipt)}
                  className={`w-full py-4 rounded-2xl mb-4 font-bold border ${
                    receipt
                      ? "bg-gray-300"
                      : "bg-[#ffd700]"
                  }`}
                >
                  領収証発行
                </button>

                <div className="grid grid-cols-2 gap-3">
                  <button
                    onClick={save}
                    className="py-6 bg-blue-500 text-white rounded-2xl font-bold"
                  >
                    現金
                  </button>
                  <button
                    onClick={save}
                    className="py-6 bg-gray-800 text-white rounded-2xl font-bold"
                  >
                    カード・QR
                  </button>
                </div>
              </>
            )}
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>

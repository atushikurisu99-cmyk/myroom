<!doctype html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Taxi Mini App</title>

<script src="https://cdn.tailwindcss.com"></script>
<script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>
html,body{
  margin:0;
  background:#f8fafc;
  font-family:-apple-system;
}
</style>
</head>

<body>
<div id="root"></div>

<script type="text/babel">
const {useState,useMemo,useRef,useEffect} = React;

function App(){

const [screen,setScreen]=useState("top");
const [isRiding,setIsRiding]=useState(false);
const [start,setStart]=useState(null);
const [end,setEnd]=useState(null);
const [amount,setAmount]=useState("");
const [receipt,setReceipt]=useState(false);
const [saved,setSaved]=useState(false);

const inputRef=useRef(null);

// 金額フォーマット
const displayAmount=useMemo(()=>{
 if(!amount)return "";
 return Number(amount).toLocaleString("ja-JP");
},[amount]);

// カーソル自動ON
useEffect(()=>{
 if(screen==="fare"){
  setTimeout(()=>inputRef.current?.focus(),100);
 }
},[screen]);

// 保存後メッセージ3秒
useEffect(()=>{
 if(saved){
  setTimeout(()=>setSaved(false),3000);
 }
},[saved]);

// 開始
const startRide=()=>{
 setStart(new Date());
 setIsRiding(true);
 setScreen("ride");
};

// 降車
const drop=()=>{
 setEnd(new Date());
 setScreen("fare");
};

// 保存
const save=()=>{
 setSaved(true);
 setIsRiding(false);
 setAmount("");
 setReceipt(false);
 setScreen("top");
};

// 金額入力
const onChange=(e)=>{
 setAmount(e.target.value.replace(/[^\d]/g,""));
};

return(
<div className="min-h-screen flex items-center justify-center p-4">

<div className="w-full max-w-sm bg-white rounded-3xl shadow-xl p-5">

{/* 保存メッセージ */}
{saved && (
<div className="mb-4 text-center text-sm font-bold text-green-600">
保存しました
</div>
)}

{/* TOP */}
{screen==="top" && (
<>
<button
onClick={isRiding?()=>setScreen("ride"):startRide}
className="w-full py-5 rounded-2xl bg-blue-500 text-white font-bold mb-3 active:scale-95">
{isRiding?"乗車中へ戻る":"乗務開始"}
</button>

<button className="w-full py-4 rounded-2xl bg-gray-100 mb-2">修正</button>
<button className="w-full py-4 rounded-2xl bg-gray-100 mb-2">分析</button>
<button className="w-full py-4 rounded-2xl bg-gray-100">設定</button>
</>
)}

{/* 乗車中 */}
{screen==="ride" && (
<>
<button
onClick={drop}
className="w-full py-10 rounded-3xl bg-green-500 text-white text-3xl font-bold mb-5 active:scale-95">
降車
</button>

<button
onClick={()=>setScreen("top")}
className="w-full py-4 rounded-2xl bg-gray-100">
TOP
</button>
</>
)}

{/* 金額入力 */}
{screen==="fare" && (
<>
<div className="mb-4">
<div className="text-sm text-gray-500 mb-2">金額</div>

<div className="relative">
<span className="absolute left-4 top-1/2 -translate-y-1/2 text-2xl text-gray-400">¥</span>

<input
ref={inputRef}
value={displayAmount}
onChange={onChange}
inputMode="numeric"
className="w-full text-4xl font-bold border rounded-2xl p-5 pl-12"
placeholder="0"
/>
</div>
</div>

{/* 領収証 */}
<button
onClick={()=>setReceipt(!receipt)}
className={`w-full py-4 rounded-2xl mb-4 font-bold ${
 receipt?"bg-gray-300":"bg-[#ffd700]"
}`}>
領収証発行
</button>

{/* 支払い */}
<div className="grid grid-cols-2 gap-3">
<button
onClick={save}
className="py-6 rounded-2xl bg-blue-500 text-white font-bold shadow-md active:scale-95">
現金
</button>

<button
onClick={save}
className="py-6 rounded-2xl bg-gray-800 text-white font-bold shadow-md active:scale-95">
カード・QR
</button>
</div>
</>
)}

</div>
</div>
);
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Taxi App</title>

<style>
body {
  margin:0;
  font-family:sans-serif;
  background:#f5f5f5;
}

.container {
  padding:16px;
}

/* 状態カード */
.card {
  background:#fff;
  border-radius:16px;
  padding:16px;
  margin-bottom:12px;
}

/* メインボタン */
.main-btn {
  width:100%;
  padding:26px;
  font-size:22px;
  border:none;
  border-radius:16px;
  background:#007aff;
  color:#fff;
  margin-bottom:16px;
}

/* ちょい履歴 */
.subtle {
  opacity:0.7;
}

/* ボトムシート */
.bottom-sheet {
  position:fixed;
  left:0;
  right:0;
  bottom:-100%;
  background:#fff;
  border-radius:20px 20px 0 0;
  padding:16px;
  transition:.3s;
  max-height:85%;
  overflow:auto;
}

.bottom-sheet.active {
  bottom:0;
}

.close {
  text-align:right;
  font-size:22px;
  margin-bottom:10px;
}

/* 金額 */
.input-box {
  font-size:34px;
  text-align:center;
  padding:20px;
  border:1px solid #ddd;
  border-radius:14px;
  margin-bottom:14px;
}

/* ボタン群 */
.btn-row {
  display:flex;
  gap:10px;
}

.btn {
  flex:1;
  padding:16px;
  border:none;
  border-radius:12px;
  background:#eee;
}

.pay-btn {
  flex:1;
  padding:22px;
  font-size:18px;
  border:none;
  border-radius:14px;
  background:#007aff;
  color:#fff;
}

/* 履歴 */
.history-item {
  padding:12px 0;
  border-bottom:1px solid #eee;
}
</style>

</head>
<body>

<div class="container">

  <!-- 状態カード -->
  <div class="card" id="stateCard">
    <div id="cardView">
      今日のペース<br>
      <strong>--</strong>
    </div>
  </div>

  <!-- メインボタン -->
  <button class="main-btn" id="mainBtn">
    乗務開始
  </button>

  <!-- ちょい履歴 -->
  <div class="card subtle">
    <div id="miniHistory">
      --
    </div>
  </div>

  <!-- その他 -->
  <div class="card subtle" id="otherBtn">
    その他
  </div>

</div>

<!-- ===================== -->
<!-- 金額入力 -->
<!-- ===================== -->

<div class="bottom-sheet" id="fareSheet">

  <div class="close" id="closeFare">×</div>

  <div class="input-box" id="amount">
    0
  </div>

  <div class="btn-row">
    <button class="btn">+100</button>
    <button class="btn">+500</button>
    <button class="btn">+1000</button>
  </div>

  <br>

  人数：
  <div class="btn-row">
    <button class="btn">1</button>
    <button class="btn">2</button>
    <button class="btn">3</button>
    <button class="btn">4</button>
  </div>

  <br>

  <div class="btn-row">
    <button class="pay-btn">① 現金</button>
    <button class="pay-btn">② カード</button>
  </div>

</div>

<!-- ===================== -->
<!-- その他 -->
<!-- ===================== -->

<div class="bottom-sheet" id="otherSheet">

  <div class="close" id="closeOther">×</div>

  <div id="openHistory">履歴</div>
  <div>分析</div>
  <div>設定</div>

</div>

<!-- ===================== -->
<!-- 履歴 -->
<!-- ===================== -->

<div class="bottom-sheet" id="historySheet">

  <div class="close" id="closeHistory">×</div>

  <h3>履歴</h3>

  <div id="historyList">
  </div>

</div>

<!-- JS読み込み -->
<script src="data.js"></script>
<script src="calc.js"></script>
<script src="app.js"></script>

</body>
</html>

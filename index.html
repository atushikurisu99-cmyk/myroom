<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no"
  />
  <title>Taxi Mini App</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #f8fafc;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      overflow: hidden;
      overscroll-behavior: none;
      -webkit-text-size-adjust: 100%;
    }

    body {
      touch-action: manipulation;
    }

    #root {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    button, input {
      font: inherit;
    }

    input[type="text"] {
      appearance: none;
      -webkit-appearance: none;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useEffect, useMemo, useRef, useState } = React;

    function TaxiMiniApp() {
      const [screen, setScreen] = useState("top"); // top | standby | ride | fare
      const [dutyStarted, setDutyStarted] = useState(false);
      const [isRiding, setIsRiding] = useState(false);
      const [returnTarget, setReturnTarget] = useState(null); // standby | ride | null

      const [rideStartAt, setRideStartAt] = useState(null);
      const [rideEndAt, setRideEndAt] = useState(null);

      const [pickup, setPickup] = useState("");
      const [dropoff, setDropoff] = useState("");

      const [amount, setAmount] = useState("");
      const [amountConfirmed, setAmountConfirmed] = useState(false);

      const [records, setRecords] = useState([]);
      const [showSaved, setShowSaved] = useState(false);
      const [showHistoryModal, setShowHistoryModal] = useState(false);

      // 履歴強化
      const [historyMode, setHistoryMode] = useState("day"); // day | week | month
      const [historyFilter, setHistoryFilter] = useState("all"); // all | 1 | 2
      const [historyBaseDate, setHistoryBaseDate] = useState(new Date());
      const [expandedMonthDays, setExpandedMonthDays] = useState({});

      const amountInputRef = useRef(null);
      const savedTimerRef = useRef(null);
      const clockTimerRef = useRef(null);

      const [now, setNow] = useState(new Date());

      useEffect(() => {
        clockTimerRef.current = setInterval(() => {
          setNow(new Date());
        }, 15000);

        return () => {
          if (clockTimerRef.current) clearInterval(clockTimerRef.current);
        };
      }, []);

      useEffect(() => {
        if (screen === "fare") {
          const timer = setTimeout(() => {
            amountInputRef.current?.focus();
          }, 120);
          return () => clearTimeout(timer);
        }
      }, [screen]);

      useEffect(() => {
        return () => {
          if (savedTimerRef.current) clearTimeout(savedTimerRef.current);
        };
      }, []);

      const nowText = useMemo(() => {
        return now.toLocaleTimeString("ja-JP", {
          hour: "2-digit",
          minute: "2-digit",
        });
      }, [now]);

      const elapsedText = useMemo(() => {
        if (!rideStartAt) return "0分";
        const diffMs = now.getTime() - rideStartAt.getTime();
        const diffMin = Math.max(0, Math.floor(diffMs / 1000 / 60));
        return `${diffMin}分`;
      }, [rideStartAt, now]);

      const totalAmount = useMemo(() => {
        return records.reduce((sum, record) => sum + record.amount, 0);
      }, [records]);

      const recordCount = useMemo(() => {
        return records.length;
      }, [records]);

      // ①＝現金・領収証なし
      const amount1 = useMemo(() => {
        return records
          .filter((record) => record.payment === "cash" && !record.receipt)
          .reduce((sum, record) => sum + record.amount, 0);
      }, [records]);

      // ②＝カード・QR または 領収証あり
      const amount2 = useMemo(() => {
        return records
          .filter((record) => !(record.payment === "cash" && !record.receipt))
          .reduce((sum, record) => sum + record.amount, 0);
      }, [records]);

      const previewRecords = useMemo(() => records.slice(0, 8), [records]);

      const formatMoney = (value) => `¥${value.toLocaleString("ja-JP")}`;

      const formatTime = (dateValue) => {
        if (!dateValue) return "";
        return new Date(dateValue).toLocaleTimeString("ja-JP", {
          hour: "2-digit",
          minute: "2-digit",
        });
      };

      const formatShortDate = (dateValue) => {
        const d = new Date(dateValue);
        return `${d.getMonth() + 1}/${d.getDate()}`;
      };

      const formatFullDate = (dateValue) => {
        const d = new Date(dateValue);
        const week = ["日", "月", "火", "水", "木", "金", "土"][d.getDay()];
        return `${d.getMonth() + 1}/${d.getDate()}（${week}）`;
      };

      const formatMonthText = (dateValue) => {
        const d = new Date(dateValue);
        return `${d.getFullYear()}/${d.getMonth() + 1}`;
      };

      const paymentText = (payment, receipt) => {
        if (payment === "cash" && !receipt) return "現金";
        if (payment === "cardQr" && !receipt) return "カード・QR";
        if (receipt) return "領収証発行";
        return "";
      };

      const recordType = (record) => {
        return record.payment === "cash" && !record.receipt ? "1" : "2";
      };

      const normalizePlaceLabel = (raw) => {
        if (!raw) return "未取得";
        if (raw === "取得中…" || raw === "未取得") return raw;

        let text = String(raw).trim();

        text = text
          .replace(/日本[,、]?/g, " ")
          .replace(/〒?\d{3}-?\d{4}/g, " ")
          .replace(/,/g, " ")
          .replace(/、/g, " ");

        text = text
          .replace(/広島県/g, " ")
          .replace(/広島市/g, " ")
          .replace(/中区/g, " ")
          .replace(/東区/g, " ")
          .replace(/南区/g, " ")
          .replace(/西区/g, " ")
          .replace(/安佐南区/g, " ")
          .replace(/安佐北区/g, " ")
          .replace(/安芸区/g, " ")
          .replace(/佐伯区/g, " ");

        text = text.replace(/\s+/g, " ").trim();

        const parts = text.split(" ").filter(Boolean);
        if (parts.length === 0) return "未取得";

        const chomeLike = parts.find((p) =>
          /[一二三四五六七八九十0-9０-９]+丁目/.test(p)
        );
        if (chomeLike) return chomeLike;

        const townLike = parts.find((p) =>
          /(町|本町|通|台|丘|浜|野|原|谷|峠|南|北|東|西)$/.test(p)
        );
        if (townLike) return townLike;

        if (parts.length >= 2) {
          const joined = `${parts[0]} ${parts[1]}`.trim();
          if (joined.length <= 18) return joined;
        }

        return parts[0];
      };

      const stateLabel = (() => {
        if (screen === "standby") return "乗車待機";
        if (screen === "ride") return "実車中";
        if (screen === "fare") return "金額入力";
        if (isRiding) return "実車中";
        if (dutyStarted) return "乗車待機";
        return "乗務開始前";
      })();

      const showReturnLinkOnTop =
        screen === "top" && dutyStarted && (returnTarget === "standby" || returnTarget === "ride");

      const topMainLabel = !dutyStarted ? "乗務開始" : "乗務終了";
      const topMainButtonDisabled = screen === "top" && isRiding;

      const formattedAmount = useMemo(() => {
        if (!amount) return "";
        return Number(amount).toLocaleString("ja-JP");
      }, [amount]);

      const confirmButtonMode = (() => {
        if (amountConfirmed) return "done";
        if (amount.length > 0) return "ready";
        return "idle";
      })();

      const shadowSub = "shadow-[0_6px_12px_rgba(15,23,42,0.08)]";
      const shadowMain = "shadow-[0_10px_20px_rgba(15,23,42,0.12)]";
      const cardClass = `rounded-2xl bg-white border border-slate-200 ${shadowSub}`;
      const subButtonClass =
        `w-full h-[52px] rounded-2xl text-base font-semibold bg-slate-200 text-slate-800 border border-slate-300 active:scale-[0.99] ${shadowSub}`;
      const mainButtonClass =
        `w-full h-full rounded-[28px] text-white text-3xl font-bold active:scale-[0.99] ${shadowMain}`;

      const confirmButtonClass = (() => {
        if (confirmButtonMode === "idle") {
          return `w-full rounded-2xl h-[56px] text-xl font-bold bg-slate-300 text-white ${shadowMain}`;
        }
        if (confirmButtonMode === "ready") {
          return `w-full rounded-2xl h-[56px] text-xl font-bold bg-black text-white ${shadowMain}`;
        }
        return `w-full rounded-2xl h-[56px] text-xl font-bold bg-slate-500 text-white ${shadowMain}`;
      })();

      const getLocationLabel = async (latitude, longitude) => {
        try {
          const response = await fetch(
            `https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${latitude}&lon=${longitude}&accept-language=ja`
          );
          if (!response.ok) throw new Error("reverse geocode failed");

          const data = await response.json();

          if (data.display_name) {
            return normalizePlaceLabel(data.display_name);
          }

          const address = data.address || {};
          const raw = [
            address.prefecture || "",
            address.city || address.town || address.village || "",
            address.suburb || address.neighbourhood || address.quarter || "",
            address.road || ""
          ].filter(Boolean).join(" ");

          return normalizePlaceLabel(raw);
        } catch {
          return "未取得";
        }
      };

      const getCurrentPlace = async () => {
        if (!("geolocation" in navigator)) {
          return "未取得";
        }

        try {
          const position = await new Promise((resolve, reject) => {
            navigator.geolocation.getCurrentPosition(
              resolve,
              reject,
              {
                enableHighAccuracy: true,
                timeout: 10000,
                maximumAge: 0,
              }
            );
          });

          const latitude = position.coords.latitude;
          const longitude = position.coords.longitude;

          const label = await getLocationLabel(latitude, longitude);
          return label || "未取得";
        } catch {
          return "未取得";
        }
      };

      const getDayStart = (dateValue) => {
        const d = new Date(dateValue);
        d.setHours(0, 0, 0, 0);
        return d;
      };

      const getDayEnd = (dateValue) => {
        const d = new Date(dateValue);
        d.setHours(23, 59, 59, 999);
        return d;
      };

      const getWeekStart = (dateValue) => {
        const d = getDayStart(dateValue);
        const day = d.getDay();
        const diff = day === 0 ? -6 : 1 - day;
        d.setDate(d.getDate() + diff);
        return d;
      };

      const getWeekEnd = (dateValue) => {
        const d = getWeekStart(dateValue);
        d.setDate(d.getDate() + 6);
        d.setHours(23, 59, 59, 999);
        return d;
      };

      const getMonthStart = (dateValue) => {
        const d = new Date(dateValue);
        return new Date(d.getFullYear(), d.getMonth(), 1, 0, 0, 0, 0);
      };

      const getMonthEnd = (dateValue) => {
        const d = new Date(dateValue);
        return new Date(d.getFullYear(), d.getMonth() + 1, 0, 23, 59, 59, 999);
      };

      const isSameDay = (a, b) => {
        const da = new Date(a);
        const db = new Date(b);
        return (
          da.getFullYear() === db.getFullYear() &&
          da.getMonth() === db.getMonth() &&
          da.getDate() === db.getDate()
        );
      };

      const isInRange = (dateValue, start, end) => {
        const t = new Date(dateValue).getTime();
        return t >= start.getTime() && t <= end.getTime();
      };

      const getHistoryPeriodText = () => {
        if (historyMode === "day") {
          return formatFullDate(historyBaseDate);
        }
        if (historyMode === "week") {
          const start = getWeekStart(historyBaseDate);
          const end = getWeekEnd(historyBaseDate);
          return `${formatShortDate(start)}〜${formatShortDate(end)}`;
        }
        return formatMonthText(historyBaseDate);
      };

      const filteredHistoryRecords = useMemo(() => {
        let list = [...records];

        if (historyFilter === "1") {
          list = list.filter((record) => recordType(record) === "1");
        } else if (historyFilter === "2") {
          list = list.filter((record) => recordType(record) === "2");
        }

        if (historyMode === "day") {
          list = list.filter((record) => isSameDay(record.startAt, historyBaseDate));
        } else if (historyMode === "week") {
          const start = getWeekStart(historyBaseDate);
          const end = getWeekEnd(historyBaseDate);
          list = list.filter((record) => isInRange(record.startAt, start, end));
        } else if (historyMode === "month") {
          const start = getMonthStart(historyBaseDate);
          const end = getMonthEnd(historyBaseDate);
          list = list.filter((record) => isInRange(record.startAt, start, end));
        }

        return list.sort((a, b) => new Date(b.startAt) - new Date(a.startAt));
      }, [records, historyFilter, historyMode, historyBaseDate]);

      const historySummary = useMemo(() => {
        const total = filteredHistoryRecords.reduce((sum, record) => sum + record.amount, 0);
        const count = filteredHistoryRecords.length;
        return { total, count };
      }, [filteredHistoryRecords]);

      const groupedHistory = useMemo(() => {
        const map = new Map();

        filteredHistoryRecords.forEach((record) => {
          const keyDate = new Date(record.startAt);
          const key = `${keyDate.getFullYear()}-${String(keyDate.getMonth() + 1).padStart(2, "0")}-${String(keyDate.getDate()).padStart(2, "0")}`;

          if (!map.has(key)) {
            map.set(key, {
              key,
              date: new Date(keyDate.getFullYear(), keyDate.getMonth(), keyDate.getDate()),
              records: [],
              total: 0,
              count: 0,
            });
          }

          const group = map.get(key);
          group.records.push(record);
          group.total += record.amount;
          group.count += 1;
        });

        return Array.from(map.values()).sort((a, b) => b.date - a.date);
      }, [filteredHistoryRecords]);

      useEffect(() => {
        if (!showHistoryModal) return;

        if (historyMode !== "month") return;

        const nextExpanded = {};
        groupedHistory.forEach((group, index) => {
          if (expandedMonthDays[group.key] === true) {
            nextExpanded[group.key] = true;
          } else if (index === 0) {
            nextExpanded[group.key] = true;
          }
        });
        setExpandedMonthDays(nextExpanded);
      }, [showHistoryModal, historyMode, groupedHistory]);

      const moveHistoryPeriod = (diff) => {
        const next = new Date(historyBaseDate);
        if (historyMode === "day") {
          next.setDate(next.getDate() + diff);
        } else if (historyMode === "week") {
          next.setDate(next.getDate() + diff * 7);
        } else {
          next.setMonth(next.getMonth() + diff);
        }
        setHistoryBaseDate(next);
      };

      const toggleMonthDay = (key) => {
        setExpandedMonthDays((prev) => ({
          ...prev,
          [key]: !prev[key],
        }));
      };

      const handleDutyStart = () => {
        setDutyStarted(true);
        setIsRiding(false);
        setReturnTarget("standby");
        setScreen("standby");
      };

      const performDutyEnd = () => {
        setDutyStarted(false);
        setIsRiding(false);
        setReturnTarget(null);
        setRideStartAt(null);
        setRideEndAt(null);
        setPickup("");
        setDropoff("");
        setAmount("");
        setAmountConfirmed(false);
        setRecords([]);
        setShowHistoryModal(false);
        setShowSaved(false);
        setScreen("top");
      };

      const handleDutyEnd = () => {
        if (isRiding) return;
        const ok = window.confirm("乗務を終了しますか？");
        if (!ok) return;
        performDutyEnd();
      };

      const handleGoTopFromStandby = () => {
        setReturnTarget("standby");
        setScreen("top");
      };

      const handleGoTopFromRide = () => {
        setReturnTarget("ride");
        setScreen("top");
      };

      const handleReturnLink = () => {
        if (returnTarget === "ride") {
          setScreen("ride");
          return;
        }
        if (returnTarget === "standby") {
          setScreen("standby");
        }
      };

      const handleTopMain = () => {
        if (!dutyStarted) {
          handleDutyStart();
          return;
        }
        handleDutyEnd();
      };

      const handleStartRide = async () => {
        const start = new Date();
        setRideStartAt(start);
        setRideEndAt(null);
        setIsRiding(true);
        setReturnTarget("ride");
        setPickup("取得中…");
        setDropoff("");
        setScreen("ride");

        const place = await getCurrentPlace();
        setPickup(place);
      };

      const handleDropOff = async () => {
        const end = new Date();
        setRideEndAt(end);
        setAmount("");
        setAmountConfirmed(false);
        setDropoff("取得中…");
        setScreen("fare");

        const place = await getCurrentPlace();
        setDropoff(place);
      };

      const handleAmountChange = (e) => {
        const raw = e.target.value.replace(/[^\d]/g, "");
        setAmount(raw);
        setAmountConfirmed(false);
      };

      const handleConfirmAmount = () => {
        if (!amount.trim()) return;

        const numericAmount = Number(amount);
        if (!numericAmount || numericAmount <= 0) {
          alert("正しい金額を入力してください");
          return;
        }

        amountInputRef.current?.blur();
        setAmountConfirmed(true);
      };

      const saveFare = (saveType) => {
        if (!rideStartAt || !rideEndAt) return;
        if (!amountConfirmed) return;

        const numericAmount = Number(amount);
        if (!numericAmount || numericAmount <= 0) {
          alert("正しい金額を入力してください");
          return;
        }

        let payment = "cash";
        let receipt = false;

        if (saveType === "cash") {
          payment = "cash";
          receipt = false;
        } else if (saveType === "cardQr") {
          payment = "cardQr";
          receipt = false;
        } else if (saveType === "receipt") {
          payment = "cash";
          receipt = true;
        }

        const newRecord = {
          id: Date.now(),
          startAt: rideStartAt,
          endAt: rideEndAt,
          amount: numericAmount,
          payment,
          receipt,
          pickup: pickup.trim(),
          dropoff: dropoff.trim(),
        };

        setRecords((prev) => [newRecord, ...prev]);
        setIsRiding(false);
        setReturnTarget("standby");
        setRideStartAt(null);
        setRideEndAt(null);
        setPickup("");
        setDropoff("");
        setAmount("");
        setAmountConfirmed(false);
        setScreen("standby");

        setShowSaved(true);
        if (savedTimerRef.current) clearTimeout(savedTimerRef.current);
        savedTimerRef.current = setTimeout(() => {
          setShowSaved(false);
        }, 2200);
      };

      const renderHistoryRecordCard = (record) => {
        const type = recordType(record);

        return (
          <button
            key={record.id}
            type="button"
            onClick={() => alert("次で修正画面を追加します")}
            className={`w-full text-left rounded-2xl border border-slate-200 bg-white p-4 active:bg-slate-50 ${shadowSub}`}
          >
            <div className="flex items-start justify-between gap-3">
              <div className="min-w-0">
                <div className="text-xl font-bold text-slate-800">
                  {formatMoney(record.amount)}
                </div>
                <div className="mt-1 text-xs text-slate-500">
                  {formatTime(record.startAt)} → {formatTime(record.endAt)}
                </div>
              </div>

              <div className="shrink-0 text-right">
                <div
                  className={`inline-flex min-w-[34px] justify-center rounded-full px-2.5 py-1 text-xs font-bold ${
                    type === "1"
                      ? "bg-sky-100 text-sky-700"
                      : "bg-emerald-100 text-emerald-700"
                  }`}
                >
                  {type === "1" ? "①" : "②"}
                </div>
                <div className="mt-2 text-[11px] text-slate-500">
                  {paymentText(record.payment, record.receipt)}
                </div>
              </div>
            </div>

            <div className="mt-3 grid gap-1 text-sm text-slate-600">
              <div className="truncate">乗車地：{record.pickup || "未取得"}</div>
              <div className="truncate">降車地：{record.dropoff || "未取得"}</div>
            </div>
          </button>
        );
      };

      return (
        <div className="w-full h-full bg-slate-50 flex justify-center overflow-hidden">
          <div className="w-full max-w-sm h-[100svh] px-4 pt-4 pb-3 relative overflow-hidden">
            {showSaved && (
              <div className="absolute top-4 left-1/2 -translate-x-1/2 z-30 rounded-full bg-emerald-500 text-white text-sm font-bold px-5 py-2.5 shadow-lg">
                保存しました
              </div>
            )}

            {showHistoryModal && (
              <div className="absolute inset-0 z-40 bg-slate-900/40 flex items-end">
                <div className="w-full h-[78svh] rounded-t-[28px] bg-white shadow-2xl flex flex-col overflow-hidden">
                  <div className="px-4 pt-3 pb-2 border-b border-slate-100 shrink-0">
                    <div className="w-12 h-1.5 rounded-full bg-slate-200 mx-auto mb-3"></div>

                    <div className="flex items-center justify-between">
                      <div className="text-lg font-bold text-slate-800">履歴一覧</div>
                      <button
                        type="button"
                        onClick={() => setShowHistoryModal(false)}
                        className="px-3 py-2 rounded-xl bg-slate-100 text-slate-700 text-sm font-semibold"
                      >
                        閉じる
                      </button>
                    </div>

                    <div className="mt-3 grid gap-2">
                      <div className="grid grid-cols-3 gap-2">
                        <button
                          type="button"
                          onClick={() => setHistoryMode("day")}
                          className={`h-[42px] rounded-2xl text-sm font-bold border ${
                            historyMode === "day"
                              ? "bg-slate-800 text-white border-slate-800"
                              : "bg-slate-100 text-slate-700 border-slate-200"
                          }`}
                        >
                          日
                        </button>
                        <button
                          type="button"
                          onClick={() => setHistoryMode("week")}
                          className={`h-[42px] rounded-2xl text-sm font-bold border ${
                            historyMode === "week"
                              ? "bg-slate-800 text-white border-slate-800"
                              : "bg-slate-100 text-slate-700 border-slate-200"
                          }`}
                        >
                          週
                        </button>
                        <button
                          type="button"
                          onClick={() => setHistoryMode("month")}
                          className={`h-[42px] rounded-2xl text-sm font-bold border ${
                            historyMode === "month"
                              ? "bg-slate-800 text-white border-slate-800"
                              : "bg-slate-100 text-slate-700 border-slate-200"
                          }`}
                        >
                          月
                        </button>
                      </div>

                      <div className="grid grid-cols-[48px_1fr_48px] gap-2 items-center">
                        <button
                          type="button"
                          onClick={() => moveHistoryPeriod(-1)}
                          className="h-[42px] rounded-2xl bg-slate-100 border border-slate-200 text-slate-700 text-lg font-bold"
                        >
                          ←
                        </button>
                        <div className="h-[42px] rounded-2xl bg-slate-50 border border-slate-200 flex items-center justify-center px-3 text-sm font-bold text-slate-800">
                          {getHistoryPeriodText()}
                        </div>
                        <button
                          type="button"
                          onClick={() => moveHistoryPeriod(1)}
                          className="h-[42px] rounded-2xl bg-slate-100 border border-slate-200 text-slate-700 text-lg font-bold"
                        >
                          →
                        </button>
                      </div>

                      <div className="grid grid-cols-3 gap-2">
                        <button
                          type="button"
                          onClick={() => setHistoryFilter("all")}
                          className={`h-[40px] rounded-2xl text-sm font-bold border ${
                            historyFilter === "all"
                              ? "bg-sky-500 text-white border-sky-500"
                              : "bg-white text-slate-700 border-slate-200"
                          }`}
                        >
                          すべて
                        </button>
                        <button
                          type="button"
                          onClick={() => setHistoryFilter("1")}
                          className={`h-[40px] rounded-2xl text-sm font-bold border ${
                            historyFilter === "1"
                              ? "bg-sky-500 text-white border-sky-500"
                              : "bg-white text-slate-700 border-slate-200"
                          }`}
                        >
                          ①
                        </button>
                        <button
                          type="button"
                          onClick={() => setHistoryFilter("2")}
                          className={`h-[40px] rounded-2xl text-sm font-bold border ${
                            historyFilter === "2"
                              ? "bg-sky-500 text-white border-sky-500"
                              : "bg-white text-slate-700 border-slate-200"
                          }`}
                        >
                          ②
                        </button>
                      </div>

                      <div className="rounded-2xl bg-slate-50 border border-slate-200 px-4 py-3 flex items-center justify-between">
                        <div className="text-sm text-slate-600">件数 {historySummary.count}件</div>
                        <div className="text-base font-bold text-slate-800">
                          {formatMoney(historySummary.total)}
                        </div>
                      </div>
                    </div>
                  </div>

                  <div className="flex-1 overflow-y-auto px-4 py-3">
                    {filteredHistoryRecords.length === 0 ? (
                      <div className="rounded-2xl border border-slate-200 bg-slate-50 p-4 text-sm text-slate-500">
                        該当する履歴はありません
                      </div>
                    ) : historyMode === "month" ? (
                      <div className="grid gap-3">
                        {groupedHistory.map((group) => {
                          const opened = expandedMonthDays[group.key] === true;
                          return (
                            <div key={group.key} className="grid gap-2">
                              <button
                                type="button"
                                onClick={() => toggleMonthDay(group.key)}
                                className={`w-full rounded-2xl border border-slate-200 bg-white px-4 py-3 text-left active:bg-slate-50 ${shadowSub}`}
                              >
                                <div className="flex items-center justify-between gap-3">
                                  <div className="min-w-0">
                                    <div className="text-[18px] font-bold text-slate-800">
                                      {formatFullDate(group.date)}
                                    </div>
                                    <div className="mt-1 text-xs text-slate-500">
                                      {group.count}件
                                    </div>
                                  </div>
                                  <div className="shrink-0 text-right">
                                    <div className="text-base font-bold text-slate-800">
                                      {formatMoney(group.total)}
                                    </div>
                                    <div className="mt-1 text-xs font-semibold text-slate-500">
                                      {opened ? "閉じる" : "開く"}
                                    </div>
                                  </div>
                                </div>
                              </button>

                              {opened && (
                                <div className="pl-3 grid gap-2">
                                  {group.records.map((record) => renderHistoryRecordCard(record))}
                                </div>
                              )}
                            </div>
                          );
                        })}
                      </div>
                    ) : (
                      <div className="grid gap-4">
                        {groupedHistory.map((group) => (
                          <div key={group.key} className="grid gap-2">
                            <div className="pt-2">
                              <div className="text-[19px] font-bold text-slate-800 tracking-[-0.01em]">
                                {formatFullDate(group.date)}
                              </div>
                              <div className="mt-1 text-xs text-slate-500">
                                {group.count}件 ・ {formatMoney(group.total)}
                              </div>
                            </div>

                            <div className="grid gap-2">
                              {group.records.map((record) => renderHistoryRecordCard(record))}
                            </div>
                          </div>
                        ))}
                      </div>
                    )}
                  </div>
                </div>
              </div>
            )}

            <div className="h-full flex flex-col overflow-hidden">
              {(screen === "top" || screen === "standby" || screen === "ride") && (
                <>
                  <div className={`${cardClass} h-[172px] px-4 py-4 shrink-0 overflow-hidden`}>
                    <div className="flex items-start justify-between gap-4">
                      <div className="min-w-0">
                        <div className="text-[15px] leading-none font-semibold text-slate-700 pt-1">
                          {stateLabel}
                        </div>

                        {showReturnLinkOnTop && (
                          <button
                            type="button"
                            onClick={handleReturnLink}
                            className="mt-2 text-[14px] font-semibold text-sky-600 active:opacity-70"
                          >
                            戻る
                          </button>
                        )}
                      </div>

                      <div className="text-[58px] leading-[0.9] font-black tracking-[-0.04em] text-slate-800 shrink-0">
                        {nowText}
                      </div>
                    </div>

                    <div className="mt-5 flex items-end justify-between gap-3">
                      <div className="text-[17px] font-bold text-slate-800">
                        売上合計 {formatMoney(totalAmount)}
                      </div>
                      <div className="text-[17px] font-semibold text-slate-700">
                        {recordCount}件
                      </div>
                    </div>

                    <div className="mt-4 flex items-center justify-between gap-4 text-[15px] text-slate-600">
                      <div className="flex items-center gap-1">
                        <span>①</span>
                        <span className="font-semibold">{formatMoney(amount1)}</span>
                      </div>
                      <div className="flex items-center gap-1">
                        <span>②</span>
                        <span className="font-semibold">{formatMoney(amount2)}</span>
                      </div>
                    </div>

                    {screen === "ride" && (
                      <div className="mt-4 text-[14px] font-semibold text-slate-500">
                        開始 {formatTime(rideStartAt)} ・ 経過 {elapsedText}
                      </div>
                    )}
                  </div>

                  <div className="h-[132px] pt-4 shrink-0">
                    {screen === "top" && (
                      <button
                        type="button"
                        onClick={handleTopMain}
                        disabled={topMainButtonDisabled}
                        className={`${mainButtonClass} ${
                          topMainButtonDisabled
                            ? "bg-slate-300 text-white"
                            : dutyStarted
                            ? "bg-slate-400 text-white"
                            : "bg-sky-500 text-white"
                        }`}
                      >
                        {topMainLabel}
                      </button>
                    )}

                    {screen === "standby" && (
                      <button
                        type="button"
                        onClick={handleStartRide}
                        className={`${mainButtonClass} bg-sky-500`}
                      >
                        実車
                      </button>
                    )}

                    {screen === "ride" && (
                      <button
                        type="button"
                        onClick={handleDropOff}
                        className={`${mainButtonClass} bg-emerald-500`}
                      >
                        降車
                      </button>
                    )}
                  </div>
                </>
              )}

              {screen === "top" && (
                <div className="flex-1 min-h-0 pt-3 flex flex-col overflow-hidden">
                  <div className="grid gap-2.5 shrink-0">
                    <button type="button" className={subButtonClass}>修正</button>
                    <button type="button" className={subButtonClass}>分析</button>
                    <button type="button" className={subButtonClass}>設定</button>
                  </div>

                  <div className="pt-3 flex-1 min-h-0">
                    <div className={`${cardClass} h-full overflow-hidden flex flex-col`}>
                      <button
                        type="button"
                        onClick={() => setShowHistoryModal(true)}
                        className="px-4 py-3 border-b border-slate-100 flex items-center justify-between active:bg-slate-50"
                      >
                        <div className="text-sm font-semibold text-slate-700">履歴</div>
                        <div className="text-sm font-bold text-sky-600">＋ 履歴一覧</div>
                      </button>

                      <div className="flex-1 overflow-y-auto" onClick={() => setShowHistoryModal(true)}>
                        {previewRecords.length === 0 ? (
                          <div className="px-4 py-4 text-sm text-slate-500">
                            まだ履歴はありません
                          </div>
                        ) : (
                          previewRecords.map((record) => (
                            <div
                              key={record.id}
                              className="px-4 py-3 border-b last:border-b-0 border-slate-100"
                            >
                              <div className="flex items-start justify-between gap-3">
                                <div className="text-base font-bold text-slate-800">
                                  {formatMoney(record.amount)}
                                </div>
                                <div className="text-xs text-slate-500 shrink-0">
                                  {paymentText(record.payment, record.receipt)}
                                  {record.receipt ? " ・ 領収証" : ""}
                                </div>
                              </div>
                              <div className="mt-1 text-xs text-slate-500">
                                {formatTime(record.startAt)} → {formatTime(record.endAt)}
                              </div>
                            </div>
                          ))
                        )}
                      </div>
                    </div>
                  </div>
                </div>
              )}

              {screen === "standby" && (
                <div className="flex-1 min-h-0 pt-3 flex flex-col">
                  <div className="flex-1"></div>
                  <button
                    type="button"
                    onClick={handleGoTopFromStandby}
                    className={subButtonClass}
                  >
                    TOP
                  </button>
                  <div className="h-2 shrink-0"></div>
                </div>
              )}

              {screen === "ride" && (
                <div className="flex-1 min-h-0 pt-3 flex flex-col">
                  <div className={`${cardClass} px-4 py-3 shrink-0`}>
                    <div className="text-[14px] font-semibold text-slate-500">
                      乗車時間
                    </div>
                    <div className="mt-1 text-[18px] font-bold text-slate-800">
                      {formatTime(rideStartAt)}
                    </div>

                    <div className="mt-3 text-[14px] font-semibold text-slate-500">
                      乗車地
                    </div>
                    <div className="mt-1 text-[18px] font-bold text-slate-800">
                      {pickup || "未取得"}
                    </div>
                  </div>

                  <div className="flex-1"></div>

                  <button
                    type="button"
                    onClick={handleGoTopFromRide}
                    className={subButtonClass}
                  >
                    TOP
                  </button>
                  <div className="h-2 shrink-0"></div>
                </div>
              )}

              {screen === "fare" && (
                <div className="flex-1 min-h-0 flex flex-col overflow-hidden">
                  <div className={`${cardClass} h-[128px] px-4 py-4 shrink-0`}>
                    <div className="flex items-start justify-center gap-6">
                      <div className="flex-1 min-w-0 text-left">
                        <div className="text-[26px] font-bold text-slate-800 leading-none">
                          {formatTime(rideStartAt)}
                        </div>
                        <div className="mt-3 text-[15px] font-semibold text-slate-600 truncate">
                          {pickup || "未取得"}
                        </div>
                      </div>

                      <div className="pt-1 text-[22px] font-bold text-slate-400 shrink-0">
                        →
                      </div>

                      <div className="flex-1 min-w-0 text-right">
                        <div className="text-[26px] font-bold text-slate-800 leading-none">
                          {formatTime(rideEndAt)}
                        </div>
                        <div className="mt-3 text-[15px] font-semibold text-slate-600 truncate">
                          {dropoff || "未取得"}
                        </div>
                      </div>
                    </div>
                  </div>

                  <div className="pt-4 shrink-0">
                    <div className="relative">
                      <span className="absolute left-4 top-1/2 -translate-y-1/2 text-2xl font-bold text-slate-400">
                        ¥
                      </span>
                      <input
                        ref={amountInputRef}
                        type="text"
                        inputMode="numeric"
                        value={formattedAmount}
                        onChange={handleAmountChange}
                        placeholder="0"
                        className={`w-full rounded-[24px] border pl-12 pr-4 py-5 text-4xl font-bold text-slate-800 outline-none focus:border-sky-300 bg-white ${
                          amountConfirmed
                            ? "border-slate-400"
                            : "border-sky-300"
                        } ${shadowSub}`}
                      />
                    </div>
                  </div>

                  <div className="pt-4 flex-1 min-h-0 flex flex-col">
                    <div className="grid gap-3 shrink-0">
                      <button
                        type="button"
                        onClick={handleConfirmAmount}
                        disabled={amount.length === 0 || amountConfirmed}
                        className={confirmButtonClass}
                      >
                        {amountConfirmed ? "金額確定済" : "金額確定"}
                      </button>

                      <button
                        type="button"
                        onClick={() => saveFare("cash")}
                        disabled={!amountConfirmed}
                        className={`w-full rounded-2xl h-[56px] text-xl font-bold active:scale-[0.98] ${
                          amountConfirmed
                            ? "bg-sky-500 text-white"
                            : "bg-slate-200 text-slate-400"
                        } ${shadowMain}`}
                      >
                        現金
                      </button>

                      <button
                        type="button"
                        onClick={() => saveFare("cardQr")}
                        disabled={!amountConfirmed}
                        className={`w-full rounded-2xl h-[56px] text-xl font-bold active:scale-[0.98] ${
                          amountConfirmed
                            ? "bg-emerald-500 text-white"
                            : "bg-slate-200 text-slate-400"
                        } ${shadowMain}`}
                      >
                        カード・QR
                      </button>

                      <button
                        type="button"
                        onClick={() => saveFare("receipt")}
                        disabled={!amountConfirmed}
                        className={`w-full rounded-2xl h-[56px] text-xl font-bold active:scale-[0.98] ${
                          amountConfirmed
                            ? "bg-[#ffd700] text-black"
                            : "bg-slate-200 text-slate-400"
                        } ${shadowMain}`}
                      >
                        領収証発行
                      </button>
                    </div>

                    <div className="flex-1"></div>
                    <div className="h-2 shrink-0"></div>
                  </div>
                </div>
              )}
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<TaxiMiniApp />);
  </script>
</body>
</html>

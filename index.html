<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Taxi UI Preview</title>
  <style>
    :root{
      --bg:#dfe5ec;
      --green:#32CD32;
      --green-active:#33CC6D;
      --card:#ffffff;
      --text:#1f2a44;
      --muted:#7c8aa5;
      --shadow:0 8px 18px rgba(0,0,0,.10);
      --radius:28px;
    }
    *{box-sizing:border-box}
    html,body{height:100%;margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--text);}
    body{display:flex;justify-content:center}
    .app{
      width:min(100vw,430px);
      min-height:100vh;
      position:relative;
      background:var(--bg);
      overflow:hidden;
    }
    .safe{padding:16px 16px 0}
    .green-plane{
      position:absolute;left:0;right:0;top:0;height:340px;background:var(--green);z-index:0;
    }
    .panel{position:relative;z-index:1}
    .white-card{
      background:var(--card);border-radius:32px;box-shadow:var(--shadow);
      padding:18px 18px 16px;
    }
    .clock-row{display:flex;justify-content:space-between;align-items:flex-start}
    .weather{display:flex;gap:18px}
    .witem{font-size:12px;font-weight:700;color:var(--muted);line-height:1}
    .wemoji{font-size:26px;display:block;margin-top:6px}
    .clock{font-size:64px;font-weight:900;letter-spacing:-0.06em;line-height:.9}
    .sub{margin-top:18px;color:var(--muted);font-size:13px;font-weight:700}
    .good{color:#16a34a;font-size:20px;font-weight:900;margin-top:2px}
    .start-head{
      padding:20px 18px 12px;
      min-height:188px;
      color:#fff;
    }
    .start-head .clock{color:#fff}
    .start-label{font-size:14px;font-weight:800;margin-top:14px}
    .start-amount{display:flex;justify-content:space-between;align-items:center;margin-top:10px}
    .start-amount .money{font-size:28px;font-weight:900}
    .eye{font-size:24px;opacity:.95}
    .main-btn-wrap{
      position:relative;z-index:1;padding:0 16px;margin-top:6px;
    }
    .main-btn{
      width:100%;height:138px;border:none;border-radius:32px;color:#fff;font-size:34px;font-weight:900;
      box-shadow:0 12px 18px rgba(0,0,0,.15), inset 0 2px 0 rgba(255,255,255,.45);
      position:relative;overflow:hidden;
    }
    .main-btn:before{
      content:"";position:absolute;left:14px;right:14px;top:10px;height:38%;
      border-radius:999px;background:linear-gradient(180deg,rgba(255,255,255,.38),rgba(255,255,255,.10));
    }
    .start-btn{background:linear-gradient(180deg,#79e6c8,#23bd97,#0a8c6f)}
    .ride-btn{background:linear-gradient(180deg,#77c3ff,#3099f3,#1e73e0)}
    .drop-btn{background:linear-gradient(180deg,#f5dc68,#ecb53a,#cf8e25)}
    .section{
      position:relative;z-index:1;padding:0 16px;
    }
    .mock-zone{
      margin-top:10px;
      min-height:360px;
      display:flex;flex-direction:column;
    }
    .mock-grid{
      display:grid;grid-template-columns:1fr 1fr;gap:14px;
    }
    .mock{
      border-radius:28px;background:#edf1f5;min-height:128px;padding:18px;display:flex;flex-direction:column;justify-content:flex-start;
    }
    .mock .t{font-size:18px;font-weight:900;color:#40506e}
    .mock .s{font-size:13px;font-weight:800;color:#a2afc5;margin-top:4px}
    .spacer{flex:1;min-height:14px}
    .caret-row{
      position:absolute;right:24px;bottom:98px;z-index:2;
    }
    .caret{
      width:36px;height:36px;border:none;background:transparent;font-size:34px;line-height:1;color:#b0b8c6;font-weight:900;
    }
    .info-card{
      margin-top:14px;background:#fff;border-radius:28px;box-shadow:var(--shadow);padding:18px 18px 16px;
    }
    .pickup{font-size:18px;font-weight:900}
    .meta{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:12px}
    .meta .label{font-size:12px;font-weight:800;color:var(--muted)}
    .meta .value{font-size:18px;font-weight:900}
    .fare-top{padding:16px}
    .fare-card{background:#fff;border-radius:28px;box-shadow:var(--shadow);padding:16px 18px}
    .fare-head{display:grid;grid-template-columns:1fr 32px 1fr;gap:12px;align-items:start}
    .fare-time{font-size:18px;font-weight:900}
    .fare-place{font-size:14px;font-weight:900;margin-top:8px}
    .fare-acc{font-size:12px;color:#a2afc5;font-weight:800;margin-top:6px}
    .amount-card{margin-top:12px;background:#fff;border-radius:24px;box-shadow:var(--shadow);padding:14px 18px;display:flex;justify-content:space-between;align-items:center}
    .amount-val{font-size:28px;font-weight:900}
    .ride-count{font-size:14px;font-weight:900}
    .pax{display:flex;gap:8px;margin-top:16px}
    .pbtn{width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:900;background:#e9ecef;color:#666}
    .pbtn.on{background:#808C88;color:#fff}
    .pay{margin-top:12px;display:grid;gap:14px}
    .paybtn{height:72px;border:none;border-radius:22px;font-size:24px;font-weight:900;box-shadow:var(--shadow)}
    .cash{background:#4a4aff;color:#fff}
    .cardqr{background:#72ee81;color:#072b16}
    .receipt{background:#f0ef45;color:#272700}
    .nav{
      position:absolute;left:0;right:0;bottom:0;height:96px;background:var(--green);z-index:3;
      border-top-left-radius:26px;border-top-right-radius:26px;
    }
    .nav-active{
      position:absolute;top:-18px;width:88px;height:88px;border-radius:50%;background:var(--green-active);
      display:flex;align-items:center;justify-content:center;font-weight:900;color:#fff;
    }
    .nav-row{
      height:100%;display:grid;grid-template-columns:1fr 1fr 1fr;align-items:end;padding-bottom:12px;
    }
    .nav-item{position:relative;text-align:center;color:#fff;font-size:12px;font-weight:900}
    .nav-item .icon{font-size:30px;line-height:1;margin-bottom:6px}
    .nav-item.center .icon{font-size:22px}
    .home-shape{
      display:inline-block;width:28px;height:28px;position:relative;
    }
    .home-shape:before{
      content:"";position:absolute;left:2px;right:2px;top:1px;height:14px;
      background:#fff;clip-path:polygon(50% 0,100% 60%,88% 60%,88% 100%,62% 100%,62% 68%,38% 68%,38% 100%,12% 100%,12% 60%,0 60%);
    }
    .grid9{
      width:24px;height:24px;display:grid;grid-template-columns:repeat(3,1fr);gap:3px;margin:0 auto 6px;
    }
    .grid9 span{width:5px;height:5px;background:#fff;border-radius:50%;display:block}
    .tabbar{
      position:fixed;left:0;right:0;top:0;background:rgba(255,255,255,.92);backdrop-filter:blur(8px);z-index:5;
      padding:8px 10px;border-bottom:1px solid rgba(0,0,0,.08);display:flex;gap:8px;justify-content:center;flex-wrap:wrap
    }
    .tabbar button{
      border:none;border-radius:999px;padding:8px 12px;font-weight:800;background:#e5e7eb;color:#334155
    }
    .tabbar button.on{background:#0f172a;color:#fff}
    .top-offset{height:58px}
  </style>
</head>
<body>
  <div class="tabbar">
    <button data-screen="start" class="on">乗務開始</button>
    <button data-screen="standby">実車</button>
    <button data-screen="ride">降車</button>
    <button data-screen="fare">金額入力</button>
  </div>

  <div class="app">
    <div class="top-offset"></div>
    <div id="screen"></div>
  </div>

<script>
const screenEl = document.getElementById('screen');
const tabButtons = [...document.querySelectorAll('.tabbar button')];

function nav(activeCenter=false, centerLabel='経費'){
  return `
    <div class="nav">
      ${activeCenter
        ? `<div class="nav-active" style="left:calc(50% - 44px)">${centerLabel}</div>`
        : `<div class="nav-active" style="left:calc(16.6667% - 44px)"><span class="home-shape"></span></div>`
      }
      <div class="nav-row">
        <div class="nav-item">
          ${!activeCenter ? '<div class="icon"><span class="home-shape"></span></div>' : '<div class="icon" style="opacity:.9"><span class="home-shape"></span></div>'}
          ホーム
        </div>
        <div class="nav-item center">
          ${activeCenter ? '<div class="icon" style="margin-bottom:8px">履歴</div>' : '<div class="icon" style="margin-bottom:8px">経費</div>'}
        </div>
        <div class="nav-item">
          <div class="grid9">${'<span></span>'.repeat(9)}</div>
          メニュー
        </div>
      </div>
    </div>
  `;
}

function whiteHeader(){
  return `
    <div class="safe panel">
      <div class="white-card">
        <div class="clock-row">
          <div class="weather">
            <div><div class="witem">4/11</div><span class="wemoji">☀️</span></div>
            <div><div class="witem">4/12</div><span class="wemoji">🌥️</span></div>
          </div>
          <div class="clock">05：45</div>
        </div>
        <div class="sub">今日のペース</div>
        <div class="good">良好</div>
      </div>
    </div>
  `;
}

function renderStart(){
  screenEl.innerHTML = `
    <div class="green-plane"></div>
    <div class="panel">
      <div class="safe">
        <div class="start-head">
          <div class="clock-row">
            <div></div>
            <div class="clock">05：45</div>
          </div>
          <div class="start-label">当月達成売上</div>
          <div class="start-amount">
            <div class="money">¥0</div>
            <div class="eye">◉</div>
          </div>
        </div>
      </div>
      <div class="main-btn-wrap">
        <button class="main-btn start-btn">乗務開始</button>
      </div>
      <div class="section">
        <div class="mock-zone">
          <div class="mock-grid">
            <div class="mock"><div class="t">売上</div><div class="s">グラフ</div></div>
            <div class="mock"><div class="t">本数</div><div class="s">推移</div></div>
          </div>
          <div class="spacer"></div>
          <div class="mock-grid">
            <div class="mock"><div class="t">時間帯</div><div class="s">動き</div></div>
            <div class="mock"><div class="t">分析</div><div class="s">入口</div></div>
          </div>
        </div>
      </div>
      <div class="caret-row"><button class="caret">▲</button></div>
      ${nav(false,'経費')}
    </div>
  `;
}
function renderStandby(){
  screenEl.innerHTML = `
    <div class="green-plane"></div>
    <div class="panel">
      ${whiteHeader()}
      <div class="main-btn-wrap"><button class="main-btn ride-btn">実車</button></div>
      ${nav(true,'履歴')}
    </div>
  `;
}
function renderRide(){
  screenEl.innerHTML = `
    <div class="green-plane"></div>
    <div class="panel">
      ${whiteHeader()}
      <div class="main-btn-wrap"><button class="main-btn drop-btn">降車</button></div>
      <div class="section">
        <div class="info-card">
          <div class="pickup">取得中...</div>
          <div class="meta">
            <div><div class="label">乗車時刻</div><div class="value">05:45</div></div>
            <div style="text-align:right"><div class="label">経過時間</div><div class="value">0分</div></div>
          </div>
        </div>
      </div>
      ${nav(true,'履歴')}
    </div>
  `;
}
function renderFare(){
  screenEl.innerHTML = `
    <div class="panel">
      <div class="fare-top">
        <div class="fare-card">
          <div class="fare-head">
            <div>
              <div class="fare-time">05:45</div>
              <div class="fare-place">船越南三丁目</div>
              <div class="fare-acc">精度：55m</div>
            </div>
            <div style="padding-top:8px;text-align:center;color:#94a3b8;font-weight:900">→</div>
            <div style="text-align:right">
              <div class="fare-time">05:45</div>
              <div class="fare-place">船越南三丁目</div>
              <div class="fare-acc">精度：55m</div>
            </div>
          </div>
        </div>
        <div class="amount-card">
          <div class="amount-val">¥ 1,200</div>
          <div class="ride-count">乗車人員 <span style="font-size:28px">1</span>名</div>
        </div>
        <div class="pax">
          <div class="pbtn on">1</div>
          <div class="pbtn">2</div>
          <div class="pbtn">3</div>
          <div class="pbtn">4</div>
        </div>
        <div class="pay">
          <button class="paybtn cash">現金</button>
          <button class="paybtn cardqr">カード・QR</button>
          <button class="paybtn receipt">領収証発行</button>
        </div>
      </div>
    </div>
  `;
}

function setScreen(name){
  tabButtons.forEach(b=>b.classList.toggle('on', b.dataset.screen===name));
  if(name==='start') renderStart();
  if(name==='standby') renderStandby();
  if(name==='ride') renderRide();
  if(name==='fare') renderFare();
}
tabButtons.forEach(b=>b.addEventListener('click', ()=>setScreen(b.dataset.screen)));
setScreen('start');
</script>
</body>
</html>

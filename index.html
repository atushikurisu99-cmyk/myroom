<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no"
  />
  <title>Taxi UI Fixed Lines</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    html,
    body,
    #root {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #dfe5ee;
      font-family:
        -apple-system,
        BlinkMacSystemFont,
        "Segoe UI",
        Roboto,
        "Hiragino Sans",
        "Hiragino Kaku Gothic ProN",
        "Yu Gothic",
        Meiryo,
        sans-serif;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    button,
    input {
      font: inherit;
    }

    .num-bold {
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      font-feature-settings: "tnum";
    }

    .hide-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    .hide-scrollbar::-webkit-scrollbar {
      display: none;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useEffect, useLayoutEffect, useMemo, useRef, useState } = React;

    const COLORS = {
      bg: "#dfe5ee",
      green: "#32CD32",
      navActive: "#39BF6A",
      card: "#ffffff",
      text: "#1f2a44",
      sub: "#6e7a93",
      good: "#28a26b",
      graphText: "#445673",
      graphSub: "#98a6bc",
    };

    const LAYOUT = {
      shellW: 430,
      navH: 112,

      side: 20,

      line1ClockTop: 40,
      line2HeaderBottom: 180,
      line3ButtonTop: 196,
      line4ButtonBottom: 338,
      line5GreenBottom: 346,
      line6ContentTop: 354,

      headerH: 180,
      buttonH: 142,
      contentPlaceholderH: 124,

      headerInnerX: 16,
      topBandTop: 40,
      lowerBandTop: 118,
      lowerBandH: 50,

      clockRight: 12,

      switchLabelTop: 8,
      switchMainBottom: 4,
      paceDotSize: 10,

      weatherDayFont: 11,
      weatherDayWidth: 40,
      weatherDayHeight: 12,
      weatherIconSize: 22,

      weatherCol2Ratio: 0.2,
      weatherCol3Ratio: 0.3,

      weatherDayTopInset: 9,
      weatherIconBottomInset: 1,

      weatherAllXAdjust: -31,
      weatherDayXAdjust: 0,
      weatherIconXAdjust: 0,
      weatherDayYAdjust: 0,
      weatherIconYAdjust: 0,

      topMoneyNumberFont: 26,
      topMoneyYenFont: 20,
      topMoneyEyeLeft: "90%",
      topMoneyEyeSize: 26,
      topMoneyEyeBottom: 5,
      topMoneyYenRight: 72,
      topMoneyDigitsRight: 96,
      topMoneyDigitsWidth: 170,

      graphCardH: 72,
      graphGapY: 16,
      graphGapX: 14,
      graphTitleFont: 16,
      graphSubFont: 11,
      graphPadX: 14,
      graphPadTop: 12,

      // bottom nav
      bottomBandH: 70,
      bottomBandRadius: 26,
      bottomBandBottom: 0,

      navCircleSize: 96,
      navCircleTop: -10,

      navBlockTop: 18,
      navBlockHeight: 40,
      navBlockGap: 4,

      navCenterTextSize: 18,
      navSideTextSize: 12,

      // 指定倍率
      navSideIconSize: 31.2, // 家アイコン 1.3倍
      navMenuIconSize: 30.8, // 9点アイコン 1.1倍
    };

    function formatMoneyNoYen(value) {
      return Number(value || 0).toLocaleString("ja-JP");
    }

    function Clock({ color = "#1f2a44", measureRef = null }) {
      const [now, setNow] = useState(new Date());

      useEffect(() => {
        const id = setInterval(() => setNow(new Date()), 1000);
        return () => clearInterval(id);
      }, []);

      const hh = String(now.getHours()).padStart(2, "0");
      const mm = String(now.getMinutes()).padStart(2, "0");

      return (
        <div
          ref={measureRef}
          className="num-bold leading-none tracking-[-0.05em]"
          style={{ color, fontSize: "68px" }}
        >
          {hh}：{mm}
        </div>
      );
    }

    function EyeIcon() {
      return (
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path
            d="M2.2 12C4.1 8.7 7.7 6.6 12 6.6C16.3 6.6 19.9 8.7 21.8 12C19.9 15.3 16.3 17.4 12 17.4C7.7 17.4 4.1 15.3 2.2 12Z"
            stroke="white"
            strokeWidth="1.8"
          />
          <circle cx="12" cy="12" r="3.1" fill="white" />
        </svg>
      );
    }

    function HomeIcon() {
      return (
        <div
          style={{
            width: `${LAYOUT.navSideIconSize}px`,
            height: `${LAYOUT.navSideIconSize}px`,
            display: "flex",
            alignItems: "center",
            justifyContent: "center",
            flexShrink: 0,
          }}
          aria-hidden="true"
        >
          <svg
            viewBox="0 0 24 24"
            style={{ width: "100%", height: "100%", display: "block", fill: "#ffffff" }}
          >
            <path d="M3 11L12 3L21 11V20C21 20.5523 20.5523 21 20 21H14V14H10V21H4C3.44772 21 3 20.5523 3 20V11Z" />
          </svg>
        </div>
      );
    }

    function MenuDotsIcon() {
      const dots = [5, 12, 19];
      return (
        <svg
          width={LAYOUT.navMenuIconSize}
          height={LAYOUT.navMenuIconSize}
          viewBox="0 0 24 24"
          fill="none"
          aria-hidden="true"
          style={{ display: "block", flexShrink: 0 }}
        >
          {dots.map((x) =>
            dots.map((y) => (
              <circle key={`${x}-${y}`} cx={x} cy={y} r="1.9" fill="white" />
            ))
          )}
        </svg>
      );
    }

    function SunWeatherIcon({ size = 22 }) {
      return (
        <svg width={size} height={size} viewBox="0 0 24 24" aria-hidden="true">
          <circle cx="12" cy="12" r="5.2" fill="#F7B500" stroke="#E28A00" strokeWidth="1" />
          <g stroke="#F7B500" strokeWidth="1.6" strokeLinecap="round">
            <line x1="12" y1="1.8" x2="12" y2="4.5" />
            <line x1="12" y1="19.5" x2="12" y2="22.2" />
            <line x1="1.8" y1="12" x2="4.5" y2="12" />
            <line x1="19.5" y1="12" x2="22.2" y2="12" />
            <line x1="4.6" y1="4.6" x2="6.6" y2="6.6" />
            <line x1="17.4" y1="17.4" x2="19.4" y2="19.4" />
            <line x1="17.4" y1="6.6" x2="19.4" y2="4.6" />
            <line x1="4.6" y1="19.4" x2="6.6" y2="17.4" />
          </g>
        </svg>
      );
    }

    function PartlyCloudyWeatherIcon({ size = 22 }) {
      return (
        <svg width={size} height={size} viewBox="0 0 24 24" aria-hidden="true">
          <g transform="translate(1,1)">
            <circle cx="8" cy="8" r="4.2" fill="#F7B500" stroke="#E28A00" strokeWidth="1" />
            <g stroke="#F7B500" strokeWidth="1.4" strokeLinecap="round">
              <line x1="8" y1="1.2" x2="8" y2="3.2" />
              <line x1="8" y1="12.8" x2="8" y2="14.8" />
              <line x1="1.2" y1="8" x2="3.2" y2="8" />
              <line x1="12.8" y1="8" x2="14.8" y2="8" />
              <line x1="3.4" y1="3.4" x2="4.9" y2="4.9" />
              <line x1="11.1" y1="11.1" x2="12.6" y2="12.6" />
              <line x1="11.1" y1="4.9" x2="12.6" y2="3.4" />
              <line x1="3.4" y1="12.6" x2="4.9" y2="11.1" />
            </g>
          </g>
          <g transform="translate(7,9)">
            <path
              d="M3.2 8.8H11.6C14 8.8 15.6 7.4 15.6 5.4C15.6 3.6 14.2 2.2 12.4 2.2C12 2.2 11.6 2.3 11.3 2.4C10.7 1 9.4 0 7.8 0C5.6 0 3.8 1.8 3.8 4C1.8 4.2 0.4 5.6 0.4 7.2C0.4 8.2 1.4 8.8 3.2 8.8Z"
              fill="#F3F5F8"
              stroke="#C8D0DA"
              strokeWidth="1"
            />
          </g>
        </svg>
      );
    }

    function WeatherOverlay({ positions }) {
      if (!positions) return null;

      const dayStyle = (x, y) => ({
        position: "absolute",
        left: `${x}px`,
        top: `${y}px`,
        width: `${LAYOUT.weatherDayWidth}px`,
        height: `${LAYOUT.weatherDayHeight}px`,
        lineHeight: `${LAYOUT.weatherDayHeight}px`,
        transform: "translateX(-50%)",
        textAlign: "center",
        overflow: "hidden",
      });

      const iconStyle = (x, y) => ({
        position: "absolute",
        left: `${x}px`,
        top: `${y}px`,
        width: `${LAYOUT.weatherIconSize}px`,
        height: `${LAYOUT.weatherIconSize}px`,
        transform: "translateX(-50%)",
        display: "flex",
        alignItems: "center",
        justifyContent: "center",
        overflow: "hidden",
      });

      return (
        <div className="absolute inset-0 pointer-events-none overflow-hidden">
          <div style={dayStyle(positions.col2DayX, positions.dayY)}>
            <span
              className="font-semibold text-[#7a869f]"
              style={{
                fontSize: `${LAYOUT.weatherDayFont}px`,
                lineHeight: `${LAYOUT.weatherDayHeight}px`,
                whiteSpace: "nowrap",
              }}
            >
              4/11
            </span>
          </div>

          <div style={dayStyle(positions.col3DayX, positions.dayY)}>
            <span
              className="font-semibold text-[#7a869f]"
              style={{
                fontSize: `${LAYOUT.weatherDayFont}px`,
                lineHeight: `${LAYOUT.weatherDayHeight}px`,
                whiteSpace: "nowrap",
              }}
            >
              4/12
            </span>
          </div>

          <div style={iconStyle(positions.col2IconX, positions.iconY)}>
            <SunWeatherIcon size={LAYOUT.weatherIconSize} />
          </div>

          <div style={iconStyle(positions.col3IconX, positions.iconY)}>
            <PartlyCloudyWeatherIcon size={LAYOUT.weatherIconSize} />
          </div>
        </div>
      );
    }

    function HeaderSwitchContent({ mode, data }) {
      const labelStyle = {
        position: "absolute",
        left: `${LAYOUT.headerInnerX}px`,
        top: `${LAYOUT.switchLabelTop}px`,
        fontSize: "13px",
        lineHeight: "1",
        color: COLORS.sub,
        fontWeight: 700,
        whiteSpace: "nowrap",
      };

      const moneyWrapStyle = {
        position: "absolute",
        left: `${LAYOUT.headerInnerX}px`,
        right: `${LAYOUT.headerInnerX}px`,
        bottom: `${LAYOUT.switchMainBottom}px`,
        height: "26px",
      };

      const digitsStyle = {
        position: "absolute",
        right: "18px",
        bottom: "0px",
        fontSize: "26px",
        color: COLORS.text,
        lineHeight: "1",
        whiteSpace: "nowrap",
      };

      const yenStyle = {
        position: "absolute",
        right: "0px",
        bottom: "1px",
        fontSize: "20px",
        color: COLORS.text,
        lineHeight: "1",
        fontWeight: 700,
        whiteSpace: "nowrap",
      };

      if (mode === "total") {
        return (
          <>
            <div style={labelStyle}>合計</div>
            <div style={moneyWrapStyle}>
              <div className="num-bold" style={digitsStyle}>
                {formatMoneyNoYen(data.total)}
              </div>
              <div style={yenStyle}>円</div>
            </div>
          </>
        );
      }

      if (mode === "one") {
        return (
          <>
            <div style={labelStyle}>①</div>
            <div style={moneyWrapStyle}>
              <div className="num-bold" style={digitsStyle}>
                {formatMoneyNoYen(data.one)}
              </div>
              <div style={yenStyle}>円</div>
            </div>
          </>
        );
      }

      if (mode === "two") {
        return (
          <>
            <div style={labelStyle}>②</div>
            <div style={moneyWrapStyle}>
              <div className="num-bold" style={digitsStyle}>
                {formatMoneyNoYen(data.two)}
              </div>
              <div style={yenStyle}>円</div>
            </div>
          </>
        );
      }

      return (
        <>
          <div style={labelStyle}>今日のペース</div>

          <div
            style={{
              position: "absolute",
              left: `${LAYOUT.headerInnerX}px`,
              bottom: "9px",
              width: `${LAYOUT.paceDotSize}px`,
              height: `${LAYOUT.paceDotSize}px`,
              borderRadius: "999px",
              background: COLORS.good,
            }}
          />

          <div
            className="num-bold"
            style={{
              position: "absolute",
              left: `${LAYOUT.headerInnerX + 18}px`,
              bottom: "5px",
              fontSize: "18px",
              color: COLORS.good,
              lineHeight: "1",
              whiteSpace: "nowrap",
            }}
          >
            良好
          </div>
        </>
      );
    }

    function StateCard({ mode, onTap, data }) {
      const cardRef = useRef(null);
      const clockRef = useRef(null);
      const [weatherPos, setWeatherPos] = useState(null);

      useLayoutEffect(() => {
        const updateLayout = () => {
          if (!cardRef.current || !clockRef.current) return;

          const cardRect = cardRef.current.getBoundingClientRect();
          const clockRect = clockRef.current.getBoundingClientRect();

          const cardWidth = cardRect.width;
          const clockTop = clockRect.top - cardRect.top;
          const clockBottom = clockRect.bottom - cardRect.top;

          const baseCol2X = Math.round(cardWidth * LAYOUT.weatherCol2Ratio);
          const baseCol3X = Math.round(cardWidth * LAYOUT.weatherCol3Ratio);

          setWeatherPos({
            col2DayX: baseCol2X + LAYOUT.weatherAllXAdjust + LAYOUT.weatherDayXAdjust,
            col3DayX: baseCol3X + LAYOUT.weatherAllXAdjust + LAYOUT.weatherDayXAdjust,
            col2IconX: baseCol2X + LAYOUT.weatherAllXAdjust + LAYOUT.weatherIconXAdjust,
            col3IconX: baseCol3X + LAYOUT.weatherAllXAdjust + LAYOUT.weatherIconXAdjust,
            dayY: Math.round(clockTop + LAYOUT.weatherDayTopInset + LAYOUT.weatherDayYAdjust),
            iconY: Math.round(
              clockBottom - LAYOUT.weatherIconSize - LAYOUT.weatherIconBottomInset + LAYOUT.weatherIconYAdjust
            ),
          });
        };

        const raf = requestAnimationFrame(updateLayout);
        const resizeObserver = new ResizeObserver(updateLayout);

        if (cardRef.current) resizeObserver.observe(cardRef.current);
        if (clockRef.current) resizeObserver.observe(clockRef.current);

        window.addEventListener("resize", updateLayout);

        return () => {
          cancelAnimationFrame(raf);
          resizeObserver.disconnect();
          window.removeEventListener("resize", updateLayout);
        };
      }, []);

      return (
        <button
          ref={cardRef}
          type="button"
          onClick={onTap}
          className="relative w-full h-full bg-white shadow-[0_8px_22px_rgba(0,0,0,0.08)]"
          style={{ borderRadius: "8px" }}
          aria-label="表示切替"
        >
          <WeatherOverlay positions={weatherPos} />

          <div
            className="absolute"
            style={{
              top: `${LAYOUT.topBandTop}px`,
              right: `${LAYOUT.clockRight}px`,
            }}
          >
            <Clock color={COLORS.text} measureRef={clockRef} />
          </div>

          <div
            className="absolute left-0 right-0"
            style={{
              top: `${LAYOUT.lowerBandTop}px`,
              height: `${LAYOUT.lowerBandH}px`,
            }}
          >
            <HeaderSwitchContent mode={mode} data={data} />
          </div>
        </button>
      );
    }

    function TopHeaderMoney({ value }) {
      const digits = formatMoneyNoYen(value);

      return (
        <div
          className="absolute left-0 right-0"
          style={{
            top: `${LAYOUT.lowerBandTop}px`,
            height: `${LAYOUT.lowerBandH}px`,
          }}
        >
          <div
            style={{
              position: "absolute",
              left: `${LAYOUT.headerInnerX}px`,
              top: `${LAYOUT.switchLabelTop}px`,
              fontSize: "13px",
              lineHeight: "1",
              color: "#ffffff",
              fontWeight: 700,
              whiteSpace: "nowrap",
            }}
          >
            累計+未確認
          </div>

          <div
            className="num-bold"
            style={{
              position: "absolute",
              right: `${LAYOUT.topMoneyDigitsRight}px`,
              bottom: "5px",
              width: `${LAYOUT.topMoneyDigitsWidth}px`,
              fontSize: `${LAYOUT.topMoneyNumberFont}px`,
              color: "#ffffff",
              lineHeight: "1",
              whiteSpace: "nowrap",
              textAlign: "right",
              letterSpacing: "-0.04em",
              overflow: "hidden",
            }}
          >
            {digits}
          </div>

          <div
            style={{
              position: "absolute",
              right: `${LAYOUT.topMoneyYenRight}px`,
              bottom: "7px",
              fontSize: `${LAYOUT.topMoneyYenFont}px`,
              color: "#ffffff",
              lineHeight: "1",
              fontWeight: 700,
              whiteSpace: "nowrap",
            }}
          >
            円
          </div>

          <div
            style={{
              position: "absolute",
              left: LAYOUT.topMoneyEyeLeft,
              bottom: `${LAYOUT.topMoneyEyeBottom}px`,
              transform: "translateX(-50%)",
              display: "flex",
              alignItems: "center",
              justifyContent: "center",
              width: `${LAYOUT.topMoneyEyeSize}px`,
              height: `${LAYOUT.topMoneyEyeSize}px`,
            }}
          >
            <EyeIcon />
          </div>
        </div>
      );
    }

    function TopHeaderZone() {
      const headerTop = LAYOUT.line2HeaderBottom - LAYOUT.headerH;

      return (
        <div
          className="absolute"
          style={{
            left: `${LAYOUT.side}px`,
            right: `${LAYOUT.side}px`,
            top: `${headerTop}px`,
            height: `${LAYOUT.headerH}px`,
          }}
        >
          <div className="relative w-full h-full">
            <div
              className="absolute"
              style={{
                top: `${LAYOUT.topBandTop}px`,
                right: `${LAYOUT.clockRight}px`,
              }}
            >
              <Clock color="#ffffff" />
            </div>

            <TopHeaderMoney value={1000000} />
          </div>
        </div>
      );
    }

    function StateHeaderZone({ mode, onTap, data }) {
      const headerTop = LAYOUT.line2HeaderBottom - LAYOUT.headerH;

      return (
        <div
          className="absolute"
          style={{
            left: `${LAYOUT.side}px`,
            right: `${LAYOUT.side}px`,
            top: `${headerTop}px`,
            height: `${LAYOUT.headerH}px`,
          }}
        >
          <StateCard mode={mode} onTap={onTap} data={data} />
        </div>
      );
    }

    function MainButton({ label, type = "start", onClick }) {
      const bg =
        type === "start"
          ? "linear-gradient(180deg,#86e0b2 0%, #6dbb99 42%, #50937c 100%)"
          : type === "standby"
          ? "linear-gradient(180deg,#88c8f5 0%, #5b9bf0 44%, #3c73d8 100%)"
          : "linear-gradient(180deg,#f5d85e 0%, #ecb63c 42%, #d49326 100%)";

      return (
        <button
          type="button"
          onClick={onClick}
          className="relative w-full rounded-[32px] text-white overflow-hidden shadow-[0_10px_22px_rgba(0,0,0,0.14)]"
          style={{ height: `${LAYOUT.buttonH}px`, background: bg }}
        >
          <div className="absolute left-[18px] right-[18px] top-[10px] h-[54px] rounded-[28px] bg-[rgba(255,255,255,0.28)]"></div>
          <div className="absolute inset-0 flex items-center justify-center">
            <span className="text-[34px] font-black tracking-[-0.03em]">{label}</span>
          </div>
        </button>
      );
    }

    function GraphCard({ title, sub }) {
      return (
        <div
          className="rounded-[18px] bg-[rgba(248,250,252,0.56)] border border-[rgba(255,255,255,0.14)] overflow-hidden"
          style={{
            height: `${LAYOUT.graphCardH}px`,
            paddingLeft: `${LAYOUT.graphPadX}px`,
            paddingRight: `${LAYOUT.graphPadX}px`,
            paddingTop: `${LAYOUT.graphPadTop}px`,
            paddingBottom: "8px",
          }}
        >
          <div
            style={{
              fontSize: `${LAYOUT.graphTitleFont}px`,
              fontWeight: 900,
              color: COLORS.graphText,
              lineHeight: "1.1",
            }}
          >
            {title}
          </div>
          <div
            style={{
              marginTop: "6px",
              fontSize: `${LAYOUT.graphSubFont}px`,
              fontWeight: 700,
              color: COLORS.graphSub,
              lineHeight: "1.1",
            }}
          >
            {sub}
          </div>
        </div>
      );
    }

    function TopGraphArea() {
      return (
        <div
          className="grid grid-cols-2"
          style={{
            columnGap: `${LAYOUT.graphGapX}px`,
            rowGap: `${LAYOUT.graphGapY}px`,
          }}
        >
          <GraphCard title="売上" sub="グラフ" />
          <GraphCard title="本数" sub="推移" />
          <GraphCard title="時間帯" sub="動き" />
          <GraphCard title="分析" sub="入口" />
        </div>
      );
    }

    function RideInfoCard() {
      return (
        <div className="bg-white px-5 py-4 shadow-[0_8px_22px_rgba(0,0,0,0.08)] h-[124px]" style={{ borderRadius: "8px" }}>
          <div className="text-[18px] font-black text-[#1f2a44]">取得中...</div>

          <div className="mt-4 flex justify-between items-end gap-4">
            <div>
              <div className="text-[12px] font-semibold text-[#6e7a93]">乗車時刻</div>
              <div className="mt-1 text-[18px] num-bold text-[#1f2a44] leading-none">05:45</div>
            </div>
            <div className="text-right">
              <div className="text-[12px] font-semibold text-[#6e7a93]">経過時間</div>
              <div className="mt-1 text-[18px] num-bold text-[#1f2a44] leading-none">0分</div>
            </div>
          </div>
        </div>
      );
    }

    function FareInfoTop() {
      return (
        <div className="bg-white px-5 py-4 shadow-[0_8px_22px_rgba(0,0,0,0.08)]" style={{ borderRadius: "8px" }}>
          <div className="grid grid-cols-[1fr_auto_1fr] gap-4 items-start">
            <div>
              <div className="text-[16px] num-bold text-slate-800">05:45</div>
              <div className="mt-2 text-[14px] font-bold text-slate-700">船越南三丁目</div>
              <div className="mt-1 text-[12px] font-semibold text-slate-400">精度：55m</div>
            </div>
            <div className="pt-[6px] text-[22px] text-slate-300">→</div>
            <div className="text-right">
              <div className="text-[16px] num-bold text-slate-800">05:45</div>
              <div className="mt-2 text-[14px] font-bold text-slate-700">船越南三丁目</div>
              <div className="mt-1 text-[12px] font-semibold text-slate-400">精度：55m</div>
            </div>
          </div>
        </div>
      );
    }

    function FareAmountCard() {
      return (
        <div className="bg-white px-5 py-4 shadow-[0_8px_22px_rgba(0,0,0,0.08)]" style={{ borderRadius: "8px" }}>
          <div className="flex items-center justify-between gap-4">
            <div className="flex-1 text-[34px] leading-none num-bold tracking-[-0.04em] text-slate-800">
              1,200円
            </div>
            <div className="text-right">
              <div className="text-[12px] font-semibold text-slate-400">乗車人員</div>
              <div className="mt-1 flex items-end gap-1 justify-end">
                <span className="text-[12px] font-semibold text-slate-400">1</span>
                <span className="text-[12px] font-semibold text-slate-400">名</span>
              </div>
            </div>
          </div>
        </div>
      );
    }

    function PassengerDots() {
      const items = [1, 2, 3, 4];
      return (
        <div className="flex gap-4">
          {items.map((n) => {
            const selected = n === 1;
            return (
              <button
                key={n}
                type="button"
                className="w-[62px] h-[62px] rounded-full text-[28px] font-black"
                style={{
                  background: selected ? "#8e968f" : "#ece8ea",
                  color: selected ? "#ffffff" : "#6e6e73",
                }}
              >
                {n}
              </button>
            );
          })}
        </div>
      );
    }

    function PayButton({ label, bg, color = "#111827" }) {
      return (
        <button
          type="button"
          className="w-full h-[72px] rounded-[24px] text-[22px] font-bold shadow-[0_8px_16px_rgba(0,0,0,0.14)]"
          style={{ background: bg, color }}
        >
          {label}
        </button>
      );
    }

    function BottomNavBlock({ type, label }) {
      if (type === "home") {
        return (
          <div
            style={{
              height: `${LAYOUT.navBlockHeight}px`,
              display: "flex",
              flexDirection: "column",
              alignItems: "center",
              justifyContent: "center",
              gap: `${LAYOUT.navBlockGap}px`,
              position: "relative",
              zIndex: 4,
            }}
          >
            <HomeIcon />
            <div
              style={{
                fontSize: `${LAYOUT.navSideTextSize}px`,
                fontWeight: 800,
                lineHeight: "1",
                color: "#ffffff",
                whiteSpace: "nowrap",
              }}
            >
              ホーム
            </div>
          </div>
        );
      }

      if (type === "menu") {
        return (
          <div
            style={{
              height: `${LAYOUT.navBlockHeight}px`,
              display: "flex",
              flexDirection: "column",
              alignItems: "center",
              justifyContent: "center",
              gap: `${LAYOUT.navBlockGap}px`,
              position: "relative",
              zIndex: 4,
            }}
          >
            <MenuDotsIcon />
            <div
              style={{
                fontSize: `${LAYOUT.navSideTextSize}px`,
                fontWeight: 800,
                lineHeight: "1",
                color: "#ffffff",
                whiteSpace: "nowrap",
              }}
            >
              メニュー
            </div>
          </div>
        );
      }

      return (
        <div
          style={{
            height: `${LAYOUT.navBlockHeight}px`,
            display: "flex",
            alignItems: "center",
            justifyContent: "center",
            position: "relative",
            zIndex: 4,
          }}
        >
          <div
            style={{
              fontSize: `${LAYOUT.navCenterTextSize}px`,
              fontWeight: 900,
              lineHeight: "1",
              color: "#ffffff",
              whiteSpace: "nowrap",
              letterSpacing: "0.02em",
            }}
          >
            {label}
          </div>
        </div>
      );
    }

    function BottomNav({ active = "home", centerLabel = "履歴" }) {
      return (
        <div
          className="absolute left-0 right-0 bottom-0"
          style={{ height: `${LAYOUT.navH}px` }}
        >
          <div
            className="absolute left-0 right-0"
            style={{
              bottom: `${LAYOUT.bottomBandBottom}px`,
              height: `${LAYOUT.bottomBandH}px`,
              background: COLORS.green,
              borderTopLeftRadius: `${LAYOUT.bottomBandRadius}px`,
              borderTopRightRadius: `${LAYOUT.bottomBandRadius}px`,
              overflow: "visible",
              zIndex: 1,
            }}
          />

          <div
            className="absolute inset-x-0"
            style={{
              bottom: `${LAYOUT.bottomBandBottom}px`,
              height: `${LAYOUT.bottomBandH}px`,
              zIndex: 3,
            }}
          >
            <div className="absolute inset-0 grid grid-cols-3">
              {["home", "center", "menu"].map((key) => {
                const blockType = key === "center" ? "center" : key;
                const blockLabel = key === "center" ? centerLabel : "";
                const isActive = active === key;

                return (
                  <div key={key} className="relative">
                    {isActive && (
                      <div
                        className="absolute left-1/2"
                        style={{
                          top: `${LAYOUT.navCircleTop}px`,
                          transform: "translateX(-50%)",
                          width: `${LAYOUT.navCircleSize}px`,
                          height: `${LAYOUT.navCircleSize}px`,
                          borderRadius: "999px",
                          background: COLORS.navActive,
                          zIndex: 2,
                        }}
                      />
                    )}

                    <div
                      className="absolute left-1/2 -translate-x-1/2"
                      style={{
                        top: `${LAYOUT.navBlockTop}px`,
                        zIndex: 4,
                      }}
                    >
                      <BottomNavBlock
                        type={blockType}
                        label={blockLabel}
                      />
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        </div>
      );
    }

    function TopScreen({ onNext }) {
      return (
        <div className="absolute inset-0 bg-[#dfe5ee] overflow-hidden">
          <div
            className="absolute inset-x-0 top-0 bg-[#32CD32]"
            style={{ height: `${LAYOUT.line5GreenBottom}px` }}
          />

          <TopHeaderZone />

          <div
            className="absolute"
            style={{
              left: `${LAYOUT.side}px`,
              right: `${LAYOUT.side}px`,
              top: `${LAYOUT.line3ButtonTop}px`,
              height: `${LAYOUT.buttonH}px`,
            }}
          >
            <MainButton label="乗務開始" type="start" onClick={onNext} />
          </div>

          <div
            className="absolute"
            style={{
              left: `${LAYOUT.side}px`,
              right: `${LAYOUT.side}px`,
              top: `${LAYOUT.line6ContentTop}px`,
            }}
          >
            <TopGraphArea />
          </div>

          <div className="absolute right-[26px] bottom-[118px] text-[28px] font-black text-[#a7adb7] leading-none">
            ▲
          </div>

          <BottomNav active="home" centerLabel="経費" />
        </div>
      );
    }

    function StandbyScreen({ onNext, headerMode, onHeaderTap, headerData }) {
      return (
        <div className="absolute inset-0 bg-[#dfe5ee] overflow-hidden">
          <div
            className="absolute inset-x-0 top-0 bg-[#32CD32]"
            style={{ height: `${LAYOUT.line5GreenBottom}px` }}
          />

          <StateHeaderZone mode={headerMode} onTap={onHeaderTap} data={headerData} />

          <div
            className="absolute"
            style={{
              left: `${LAYOUT.side}px`,
              right: `${LAYOUT.side}px`,
              top: `${LAYOUT.line3ButtonTop}px`,
              height: `${LAYOUT.buttonH}px`,
            }}
          >
            <MainButton label="実車" type="standby" onClick={onNext} />
          </div>

          <div
            className="absolute"
            style={{
              left: `${LAYOUT.side}px`,
              right: `${LAYOUT.side}px`,
              top: `${LAYOUT.line6ContentTop}px`,
            }}
          >
            <div style={{ height: `${LAYOUT.contentPlaceholderH}px` }} />
          </div>

          <BottomNav active="center" centerLabel="履歴" />
        </div>
      );
    }

    function RideScreen({ onNext, headerMode, onHeaderTap, headerData }) {
      return (
        <div className="absolute inset-0 bg-[#dfe5ee] overflow-hidden">
          <div
            className="absolute inset-x-0 top-0 bg-[#32CD32]"
            style={{ height: `${LAYOUT.line5GreenBottom}px` }}
          />

          <StateHeaderZone mode={headerMode} onTap={onHeaderTap} data={headerData} />

          <div
            className="absolute"
            style={{
              left: `${LAYOUT.side}px`,
              right: `${LAYOUT.side}px`,
              top: `${LAYOUT.line3ButtonTop}px`,
              height: `${LAYOUT.buttonH}px`,
            }}
          >
            <MainButton label="降車" type="ride" onClick={onNext} />
          </div>

          <div
            className="absolute"
            style={{
              left: `${LAYOUT.side}px`,
              right: `${LAYOUT.side}px`,
              top: `${LAYOUT.line6ContentTop}px`,
            }}
          >
            <RideInfoCard />
          </div>

          <BottomNav active="center" centerLabel="履歴" />
        </div>
      );
    }

    function FareScreen() {
      return (
        <div className="w-full h-full relative overflow-hidden bg-[#dfe5ee]">
          <div className="relative h-full px-4 pt-4 pb-[26px] overflow-y-auto hide-scrollbar">
            <FareInfoTop />
            <div className="mt-4">
              <FareAmountCard />
            </div>
            <div className="mt-4">
              <PassengerDots />
            </div>
            <div className="mt-5 space-y-4">
              <PayButton label="現金" bg="#4d4df7" color="#111827" />
              <PayButton label="カード・QR" bg="#79e883" color="#111827" />
              <PayButton label="領収証発行" bg="#f0ef47" color="#111827" />
            </div>
          </div>
        </div>
      );
    }

    function App() {
      const [screen, setScreen] = useState("top");
      const [headerMode, setHeaderMode] = useState("pace");

      const headerData = useMemo(
        () => ({
          total: 50000,
          one: 21000,
          two: 29000,
        }),
        []
      );

      const handleHeaderTap = () => {
        setHeaderMode((prev) => {
          if (prev === "pace") return "total";
          if (prev === "total") return "one";
          if (prev === "one") return "two";
          return "pace";
        });
      };

      const view = useMemo(() => {
        if (screen === "top") {
          return <TopScreen onNext={() => setScreen("standby")} />;
        }

        if (screen === "standby") {
          return (
            <StandbyScreen
              onNext={() => setScreen("ride")}
              headerMode={headerMode}
              onHeaderTap={handleHeaderTap}
              headerData={headerData}
            />
          );
        }

        if (screen === "ride") {
          return (
            <RideScreen
              onNext={() => setScreen("fare")}
              headerMode={headerMode}
              onHeaderTap={handleHeaderTap}
              headerData={headerData}
            />
          );
        }

        return <FareScreen />;
      }, [screen, headerMode, headerData]);

      return (
        <div className="w-full h-full flex justify-center bg-[#dfe5ee] overflow-hidden">
          <div className="w-full max-w-[430px] h-full relative overflow-hidden">
            {view}
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>

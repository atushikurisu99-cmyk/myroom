function WeatherRail({ bandHeight }) {

  function DayLabel({ day, centerPercent }) {
    return (
      <div
        className="absolute text-center"
        style={{
          left: `calc(${centerPercent}% - 18px)`,
          top: "2px",
          width: "36px",
        }}
      >
        <span style={{ fontSize: "11px" }}>{day}</span>
      </div>
    );
  }

  function IconMark({ variant, centerPercent }) {
    return (
      <div
        className="absolute flex items-center justify-center"
        style={{
          left: `calc(${centerPercent}% - 11px)`,
          bottom: "2px",
          width: "22px",
          height: "22px",
        }}
      >
        {variant === "sun" ? <SunWeatherIcon /> : <PartlyCloudyWeatherIcon />}
      </div>
    );
  }

  return (
    <div className="absolute inset-0">
      <DayLabel day="4/11" centerPercent={20} />
      <DayLabel day="4/12" centerPercent={30} />

      <IconMark variant="sun" centerPercent={20} />
      <IconMark variant="partly" centerPercent={30} />
    </div>
  );
}

<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no"
  />
  <title>Taxi Mini App Mock</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #f8fafc;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      overflow: hidden;
      overscroll-behavior: none;
      -webkit-text-size-adjust: 100%;
    }

    body {
      touch-action: manipulation;
    }

    #root {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    button {
      cursor: pointer;
      touch-action: manipulation;
    }

    input, button, textarea, select {
      font: inherit;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useMemo, useState, useRef, useEffect } = React;

    function TaxiMiniAppMock() {
      const [screen, setScreen] = useState("top"); // top | standby | ride | fare
      const [dutyStarted, setDutyStarted] = useState(false);
      const [isRiding, setIsRiding] = useState(false);

      const [rideStartAt, setRideStartAt] = useState(null);
      const [rideEndAt, setRideEndAt] = useState(null);

      const [amount, setAmount] = useState("");
      const [amountConfirmed, setAmountConfirmed] = useState(false);

      const [records, setRecords] = useState([]);
      const [showSaved, setShowSaved] = useState(false);
      const [showHistoryModal, setShowHistoryModal] = useState(false);

      const amountInputRef = useRef(null);
      const savedTimerRef = useRef(null);
      const clockTimerRef = useRef(null);

      const [now, setNow] = useState(new Date());

      useEffect(() => {
        clockTimerRef.current = setInterval(() => {
          setNow(new Date());
        }, 1000 * 30);
        return () => {
          if (clockTimerRef.current) clearInterval(clockTimerRef.current);
        };
      }, []);

      const nowText = useMemo(() => {
        return now.toLocaleTimeString("ja-JP", {
          hour: "2-digit",
          minute: "2-digit",
        });
      }, [now]);

      const elapsedText = useMemo(() => {
        if (!rideStartAt) return "0分";
        const diffMs = now.getTime() - rideStartAt.getTime();
        const diffMin = Math.max(0, Math.floor(diffMs / 1000 / 60));
        return `${diffMin}分`;
      }, [rideStartAt, now]);

      const formattedAmount = useMemo(() => {
        if (!amount) return "";
        return Number(amount).toLocaleString("ja-JP");
      }, [amount]);

      const totalAmount = useMemo(() => {
        return records.reduce((sum, record) => sum + record.amount, 0);
      }, [records]);

      const recordCount = useMemo(() => records.length, [records]);

      // ①＝現金・領収証なし
      const amount1 = useMemo(() => {
        return records
          .filter((record) => record.payment === "cash" && !record.receipt)
          .reduce((sum, record) => sum + record.amount, 0);
      }, [records]);

      // ②＝カード・QR または 領収証あり
      const amount2 = useMemo(() => {
        return records
          .filter((record) => !(record.payment === "cash" && !record.receipt))
          .reduce((sum, record) => sum + record.amount, 0);
      }, [records]);

      useEffect(() => {
        if (screen === "fare") {
          const timer = setTimeout(() => {
            amountInputRef.current?.focus();
          }, 120);
          return () => clearTimeout(timer);
        }
      }, [screen]);

      useEffect(() => {
        return () => {
          if (savedTimerRef.current) clearTimeout(savedTimerRef.current);
        };
      }, []);

      const handleDutyStart = () => {
        setDutyStarted(true);
        setScreen("standby");
      };

      const handleDutyEnd = () => {
        if (isRiding) return;
        setDutyStarted(false);
        setScreen("top");
        setRideStartAt(null);
        setRideEndAt(null);
        setAmount("");
        setAmountConfirmed(false);
        setRecords([]);
      };

      const handleStartRide = () => {
        const start = new Date();
        setRideStartAt(start);
        setRideEndAt(null);
        setIsRiding(true);
        setScreen("ride");
      };

      const handleDropOff = () => {
        const end = new Date();
        setRideEndAt(end);
        setAmount("");
        setAmountConfirmed(false);
        setScreen("fare");
      };

      const handleAmountChange = (e) => {
        const raw = e.target.value.replace(/[^\d]/g, "");
        setAmount(raw);
        setAmountConfirmed(false);
      };

      const handleConfirmAmount = () => {
        if (!amount.trim()) {
          alert("金額を入力してください");
          return;
        }

        const numericAmount = Number(amount);
        if (!numericAmount || numericAmount <= 0) {
          alert("正しい金額を入力してください");
          return;
        }

        amountInputRef.current?.blur();
        setAmountConfirmed(true);
      };

      const handleSaveFare = (saveType) => {
        if (!rideStartAt || !rideEndAt) return;

        if (!amountConfirmed) {
          alert("先に金額確定を押してください");
          return;
        }

        const numericAmount = Number(amount);
        if (!numericAmount || numericAmount <= 0) {
          alert("正しい金額を入力してください");
          return;
        }

        let payment = "cash";
        let receipt = false;

        if (saveType === "cash") {
          payment = "cash";
          receipt = false;
        } else if (saveType === "cardQr") {
          payment = "cardQr";
          receipt = false;
        } else if (saveType === "receipt") {
          payment = "receipt";
          receipt = true;
        }

        const newRecord = {
          id: Date.now(),
          startAt: rideStartAt,
          endAt: rideEndAt,
          amount: numericAmount,
          payment,
          receipt,
          pickup: "",
          dropoff: "",
        };

        setRecords((prev) => [newRecord, ...prev]);
        setIsRiding(false);
        setRideStartAt(null);
        setRideEndAt(null);
        setAmount("");
        setAmountConfirmed(false);
        setScreen("standby");

        setShowSaved(true);
        if (savedTimerRef.current) clearTimeout(savedTimerRef.current);
        savedTimerRef.current = setTimeout(() => {
          setShowSaved(false);
        }, 3000);
      };

      const paymentText = (payment) => {
        if (payment === "cash") return "現金";
        if (payment === "cardQr") return "カード・QR";
        if (payment === "receipt") return "領収証発行";
        return "";
      };

      const formatTime = (dateValue) => {
        if (!dateValue) return "";
        return dateValue.toLocaleTimeString("ja-JP", {
          hour: "2-digit",
          minute: "2-digit",
        });
      };

      const stateLabel = (() => {
        if (screen === "standby") return "乗車待機";
        if (screen === "ride") return "実車中";
        if (screen === "fare") return "降車後";
        return dutyStarted ? "乗務中" : "乗務開始前";
      })();

      const shadowMain = "shadow-[0_10px_20px_rgba(15,23,42,0.12)]";
      const shadowSub = "shadow-[0_6px_12px_rgba(15,23,42,0.08)]";

      const cardClass = `rounded-2xl bg-white border border-slate-200 ${shadowSub}`;
      const subButtonClass = `w-full h-[52px] rounded-2xl text-base font-semibold bg-slate-200 text-slate-800 border border-slate-300 active:scale-[0.99] ${shadowSub}`;
      const mainButtonClass = `w-full h-full rounded-[28px] text-white text-3xl font-bold active:scale-[0.99] ${shadowMain}`;

      const previewRecords = records.slice(0, 8);

      const confirmButtonClass = (() => {
        if (amountConfirmed) {
          return `w-full rounded-2xl h-[56px] text-xl font-bold bg-slate-500 text-white active:scale-[0.99] ${shadowMain}`;
        }
        if (amount.trim()) {
          return `w-full rounded-2xl h-[56px] text-xl font-bold bg-black text-white active:scale-[0.99] ${shadowMain}`;
        }
        return `w-full rounded-2xl h-[56px] text-xl font-bold bg-slate-400 text-white active:scale-[0.99] ${shadowMain}`;
      })();

      return (
        <div className="w-full h-full bg-slate-50 flex justify-center overflow-hidden">
          <div className="w-full max-w-sm h-[100svh] px-4 pt-5 pb-3 relative overflow-hidden">
            {showSaved && (
              <div className="absolute top-4 left-1/2 -translate-x-1/2 z-30 rounded-full bg-emerald-500 text-white text-sm font-bold px-6 py-3 shadow-lg">
                保存しました
              </div>
            )}

            {showHistoryModal && (
              <div className="absolute inset-0 z-40 bg-slate-900/40 flex items-end">
                <div className="w-full h-[78svh] rounded-t-[28px] bg-white shadow-2xl flex flex-col overflow-hidden">
                  <div className="px-4 pt-3 pb-2 border-b border-slate-100">
                    <div className="w-12 h-1.5 rounded-full bg-slate-200 mx-auto mb-3"></div>
                    <div className="flex items-center justify-between">
                      <div className="text-lg font-bold text-slate-800">履歴一覧</div>
                      <button
                        type="button"
                        onClick={() => setShowHistoryModal(false)}
                        className="px-3 py-2 rounded-xl bg-slate-100 text-slate-700 text-sm font-semibold"
                      >
                        閉じる
                      </button>
                    </div>
                  </div>

                  <div className="flex-1 overflow-y-auto px-4 py-3">
                    {records.length === 0 ? (
                      <div className="rounded-2xl border border-slate-200 bg-slate-50 p-4 text-sm text-slate-500">
                        まだ履歴はありません
                      </div>
                    ) : (
                      <div className="grid gap-3">
                        {records.map((record) => (
                          <div
                            key={record.id}
                            className={`rounded-2xl border border-slate-200 bg-white p-4 ${shadowSub}`}
                          >
                            <div className="flex items-start justify-between gap-3">
                              <div>
                                <div className="text-xl font-bold text-slate-800">
                                  ¥{record.amount.toLocaleString("ja-JP")}
                                </div>
                                <div className="mt-1 text-xs text-slate-500">
                                  {formatTime(record.startAt)} → {formatTime(record.endAt)}
                                </div>
                              </div>
                              <div className="text-right text-xs text-slate-500">
                                <div>{paymentText(record.payment)}</div>
                                <div>{record.receipt ? "領収証あり" : "領収証なし"}</div>
                              </div>
                            </div>

                            <div className="mt-3 grid gap-1 text-sm text-slate-600">
                              <div>乗車地：{record.pickup || "未設定"}</div>
                              <div>降車地：{record.dropoff || "未設定"}</div>
                            </div>
                          </div>
                        ))}
                      </div>
                    )}
                  </div>
                </div>
              </div>
            )}

            <div className="h-full flex flex-col overflow-hidden">
              {screen !== "fare" && (
                <>
                  <div className={`${cardClass} h-[178px] px-4 py-4 shrink-0 overflow-hidden`}>
                    <div className="flex items-start justify-between gap-3">
                      <div className="min-w-0 flex-1 pt-1">
                        <div className="text-[28px] leading-none font-bold text-slate-800">
                          {stateLabel}
                        </div>
                      </div>
                      <div className="shrink-0 text-[56px] leading-none tracking-tight font-bold text-slate-800">
                        {nowText}
                      </div>
                    </div>

                    <div className="mt-5 flex items-end justify-between gap-3">
                      <div className="min-w-0 flex-1 text-[18px] font-bold text-slate-800 truncate">
                        売上合計 ¥{totalAmount.toLocaleString("ja-JP")}
                      </div>
                      <div className="shrink-0 text-[18px] font-semibold text-slate-800">
                        {recordCount}件
                      </div>
                    </div>

                    <div className="mt-3 flex items-center justify-between gap-3 text-[18px] text-slate-600">
                      <div className="min-w-0 font-semibold">
                        ① ¥{amount1.toLocaleString("ja-JP")}
                      </div>
                      <div className="shrink-0 font-semibold">
                        ② ¥{amount2.toLocaleString("ja-JP")}
                      </div>
                    </div>

                    <div className="mt-4 text-[18px] text-slate-500 font-semibold leading-tight">
                      {screen === "ride"
                        ? `開始 ${formatTime(rideStartAt)} ・ 経過 ${elapsedText}`
                        : ""}
                    </div>
                  </div>

                  <div className="h-[132px] pt-4 shrink-0">
                    {screen === "top" && (
                      !dutyStarted ? (
                        <button
                          type="button"
                          onClick={handleDutyStart}
                          className={`${mainButtonClass} bg-sky-500`}
                        >
                          乗務開始
                        </button>
                      ) : (
                        <button
                          type="button"
                          onClick={handleDutyEnd}
                          className={`${mainButtonClass} bg-slate-300 text-slate-800`}
                        >
                          乗務終了
                        </button>
                      )
                    )}

                    {screen === "standby" && (
                      <button
                        type="button"
                        onClick={handleStartRide}
                        className={`${mainButtonClass} bg-sky-500`}
                      >
                        実車
                      </button>
                    )}

                    {screen === "ride" && (
                      <button
                        type="button"
                        onClick={handleDropOff}
                        className={`${mainButtonClass} bg-emerald-500`}
                      >
                        降車
                      </button>
                    )}
                  </div>

                  {screen === "top" && (
                    <div className="flex-1 min-h-0 pt-3 flex flex-col overflow-hidden">
                      <div className="grid gap-2.5 shrink-0">
                        <button type="button" className={subButtonClass}>修正</button>
                        <button type="button" className={subButtonClass}>分析</button>
                        <button type="button" className={subButtonClass}>設定</button>
                      </div>

                      <div className="pt-3 flex-1 min-h-0">
                        <div className={`${cardClass} h-full overflow-hidden flex flex-col`}>
                          <button
                            type="button"
                            onClick={() => setShowHistoryModal(true)}
                            className="px-4 py-3 border-b border-slate-100 flex items-center justify-between active:bg-slate-50"
                          >
                            <div className="text-sm font-semibold text-slate-700">履歴</div>
                            <div className="text-sm font-bold text-sky-600">＋ 履歴一覧</div>
                          </button>

                          <div
                            className="flex-1 overflow-y-auto"
                            onClick={() => setShowHistoryModal(true)}
                          >
                            {previewRecords.length === 0 ? (
                              <div className="px-4 py-4 text-sm text-slate-500">
                                まだ履歴はありません
                              </div>
                            ) : (
                              previewRecords.map((record) => (
                                <div
                                  key={record.id}
                                  className="px-4 py-3 border-b last:border-b-0 border-slate-100"
                                >
                                  <div className="flex items-start justify-between gap-3">
                                    <div className="text-base font-bold text-slate-800">
                                      ¥{record.amount.toLocaleString("ja-JP")}
                                    </div>
                                    <div className="text-xs text-slate-500 shrink-0">
                                      {paymentText(record.payment)}
                                      {record.receipt ? " ・ 領収証" : ""}
                                    </div>
                                  </div>
                                  <div className="mt-1 text-xs text-slate-500">
                                    {formatTime(record.startAt)} → {formatTime(record.endAt)}
                                  </div>
                                </div>
                              ))
                            )}
                          </div>
                        </div>
                      </div>
                    </div>
                  )}

                  {screen === "standby" && (
                    <div className="flex-1 min-h-0 pt-3 flex flex-col">
                      <div className="flex-1"></div>
                      <button
                        type="button"
                        onClick={() => setScreen("top")}
                        className={subButtonClass}
                      >
                        TOP
                      </button>
                      <div className="h-2 shrink-0"></div>
                    </div>
                  )}

                  {screen === "ride" && (
                    <div className="flex-1 min-h-0 pt-3 flex flex-col">
                      <div className="shrink-0 px-2 text-slate-600">
                        <div className="text-[18px] font-bold">
                          {formatTime(rideStartAt)}　乗車
                        </div>
                        <div className="mt-2 text-[18px] font-semibold">
                          乗車地：未設定
                        </div>
                      </div>
                      <div className="flex-1"></div>
                      <button
                        type="button"
                        onClick={() => setScreen("top")}
                        className={subButtonClass}
                      >
                        TOP
                      </button>
                      <div className="h-2 shrink-0"></div>
                    </div>
                  )}
                </>
              )}

              {screen === "fare" && (
                <div className="flex-1 min-h-0 flex flex-col overflow-hidden">
                  <div className={`${cardClass} h-[106px] px-4 py-4 shrink-0`}>
                    <div className="text-[18px] font-bold text-slate-700">
                      {formatTime(rideStartAt)} → {formatTime(rideEndAt)}
                    </div>
                    <div className="mt-4 text-[18px] text-slate-500 font-semibold">
                      金額入力後に金額確定を押してください
                    </div>
                  </div>

                  <div className="pt-4 shrink-0">
                    <div className="relative">
                      <span className="absolute left-4 top-1/2 -translate-y-1/2 text-[32px] font-bold text-slate-400">
                        ¥
                      </span>
                      <input
                        ref={amountInputRef}
                        type="text"
                        inputMode="numeric"
                        value={formattedAmount}
                        onChange={handleAmountChange}
                        placeholder="0"
                        className={`w-full rounded-[24px] border pl-14 pr-4 py-6 text-[56px] leading-none font-bold text-slate-800 outline-none ${
                          amountConfirmed
                            ? "border-slate-300 bg-white"
                            : "border-slate-300 bg-white"
                        } ${shadowSub}`}
                      />
                    </div>
                  </div>

                  <div className="pt-4 flex-1 min-h-0 flex flex-col">
                    <div className="grid gap-3 shrink-0">
                      <button
                        type="button"
                        onClick={handleConfirmAmount}
                        className={confirmButtonClass}
                      >
                        {amountConfirmed ? "金額確定済み" : "金額確定"}
                      </button>

                      <button
                        type="button"
                        onClick={() => handleSaveFare("cash")}
                        disabled={!amountConfirmed}
                        className={`w-full rounded-2xl h-[56px] text-xl font-bold active:scale-[0.98] ${
                          amountConfirmed
                            ? "bg-sky-500 text-white"
                            : "bg-slate-200 text-slate-400"
                        } ${shadowMain}`}
                      >
                        現金
                      </button>

                      <button
                        type="button"
                        onClick={() => handleSaveFare("cardQr")}
                        disabled={!amountConfirmed}
                        className={`w-full rounded-2xl h-[56px] text-xl font-bold active:scale-[0.98] ${
                          amountConfirmed
                            ? "bg-emerald-500 text-white"
                            : "bg-slate-200 text-slate-400"
                        } ${shadowMain}`}
                      >
                        カード・QR
                      </button>

                      <button
                        type="button"
                        onClick={() => handleSaveFare("receipt")}
                        disabled={!amountConfirmed}
                        className={`w-full rounded-2xl h-[56px] text-xl font-bold border active:scale-[0.98] ${
                          amountConfirmed
                            ? "bg-[#ffd700] text-black border-[#e6c200]"
                            : "bg-slate-200 text-slate-400 border-slate-200"
                        } ${shadowMain}`}
                      >
                        領収証発行
                      </button>
                    </div>

                    <div className="flex-1"></div>
                    <div className="h-2 shrink-0"></div>
                  </div>
                </div>
              )}
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<TaxiMiniAppMock />);
  </script>
</body>
</html>

<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no"
  />
  <title>Taxi UI Fixed Lines</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    html,
    body,
    #root {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #dfe5ee;
      font-family:
        -apple-system,
        BlinkMacSystemFont,
        "Segoe UI",
        Roboto,
        "Hiragino Sans",
        "Hiragino Kaku Gothic ProN",
        "Yu Gothic",
        Meiryo,
        sans-serif;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    button,
    input {
      font: inherit;
    }

    .num-bold {
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      font-feature-settings: "tnum";
    }

    .hide-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    .hide-scrollbar::-webkit-scrollbar {
      display: none;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="./constants.js" type="text/babel"></script>
  <script src="./utils.js" type="text/babel"></script>
  <script src="./geo.js" type="text/babel"></script>
  <script src="./components.js" type="text/babel"></script>
  <script src="./useTaxiAppState.js" type="text/babel"></script>
  <script src="./TopScreen.js" type="text/babel"></script>
  <script src="./StandbyScreen.js" type="text/babel"></script>
  <script src="./RideScreen.js" type="text/babel"></script>
  <script src="./FareScreen.js" type="text/babel"></script>
  <script src="./HistoryModal.js" type="text/babel"></script>
  <script src="./FinishCheckScreen.js" type="text/babel"></script>
  <script src="./TaxiMiniApp.js" type="text/babel"></script>
</body>
</html>

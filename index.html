<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no"
  />
  <title>Taxi Mini App Mock</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #f8fafc;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      overscroll-behavior: none;
      touch-action: manipulation;
      position: fixed;
      inset: 0;
    }

    #root {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    input, button, textarea, select {
      font: inherit;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useMemo, useState } = React;

    function TaxiMiniAppMock() {
      const [screen, setScreen] = useState("top");
      const [isRiding, setIsRiding] = useState(false);
      const [rideStartAt, setRideStartAt] = useState(null);
      const [rideEndAt, setRideEndAt] = useState(null);
      const [amount, setAmount] = useState("");
      const [receipt, setReceipt] = useState(false);
      const [records, setRecords] = useState([]);

      const nowText = useMemo(() => {
        return new Date().toLocaleTimeString("ja-JP", {
          hour: "2-digit",
          minute: "2-digit",
        });
      }, [screen, isRiding]);

      const elapsedText = useMemo(() => {
        if (!rideStartAt) return "00分";
        const diffMs = Date.now() - rideStartAt.getTime();
        const diffMin = Math.max(0, Math.floor(diffMs / 1000 / 60));
        return `${diffMin}分`;
      }, [rideStartAt, screen, isRiding]);

      const handleStartRide = () => {
        const start = new Date();
        setRideStartAt(start);
        setRideEndAt(null);
        setIsRiding(true);
        setScreen("ride");
      };

      const handleReturnToRide = () => {
        setScreen("ride");
      };

      const handleDropOff = () => {
        const end = new Date();
        setRideEndAt(end);
        setAmount("");
        setReceipt(false);
        setScreen("fare");
      };

      const handleSaveFare = (selectedPayment) => {
        if (!rideStartAt || !rideEndAt) return;
        if (!amount.trim()) {
          alert("金額を入力してください");
          return;
        }

        const numericAmount = Number(amount.replace(/[^\d]/g, ""));
        if (!numericAmount || numericAmount <= 0) {
          alert("正しい金額を入力してください");
          return;
        }

        const newRecord = {
          id: Date.now(),
          startAt: rideStartAt,
          endAt: rideEndAt,
          amount: numericAmount,
          payment: selectedPayment,
          receipt,
        };

        setRecords((prev) => [newRecord, ...prev]);
        setIsRiding(false);
        setRideStartAt(null);
        setRideEndAt(null);
        setAmount("");
        setReceipt(false);
        setScreen("top");
      };

      const totalToday = records.reduce((sum, record) => sum + record.amount, 0);

      return (
        <div className="h-[100dvh] w-full bg-slate-50 flex items-center justify-center p-4 overflow-hidden">
          <div className="w-full max-w-sm h-full max-h-[100dvh] rounded-[28px] bg-white shadow-xl border border-slate-200 overflow-hidden">
            <div className="px-5 pt-6 pb-4 border-b border-slate-100">
              <div className="text-sm text-slate-400">TAXI用LINEミニアプリ</div>
              <div className="mt-1 text-xl font-bold text-slate-800">
                {screen === "top" && "TOP"}
                {screen === "ride" && "乗車画面"}
                {screen === "fare" && "金額入力"}
              </div>
            </div>

            {screen === "top" && (
              <div className="p-5 h-[calc(100%-77px)] overflow-hidden">
                <div className="rounded-2xl bg-slate-50 border border-slate-200 px-4 py-4 mb-5">
                  <div className="text-sm text-slate-500">状態</div>
                  <div className="mt-1 text-2xl font-bold text-slate-800">
                    {isRiding ? "乗車中" : "待機中"}
                  </div>
                  <div className="mt-2 text-sm text-slate-500">
                    現在時刻 {nowText}
                    {isRiding && rideStartAt ? ` ・ 経過 ${elapsedText}` : ""}
                  </div>
                  <div className="mt-2 text-sm text-slate-500">
                    本日売上 ¥{totalToday.toLocaleString("ja-JP")}
                  </div>
                </div>

                <div className="grid gap-3">
                  <button
                    onClick={isRiding ? handleReturnToRide : handleStartRide}
                    className={`w-full rounded-2xl py-5 text-lg font-bold transition active:scale-[0.99] ${
                      isRiding
                        ? "bg-sky-100 text-sky-700 border border-sky-200"
                        : "bg-sky-500 text-white shadow-md"
                    }`}
                  >
                    {isRiding ? "乗車中へ戻る" : "乗務開始"}
                  </button>

                  <button className="w-full rounded-2xl py-4 text-base font-semibold bg-slate-100 text-slate-700 border border-slate-200 active:scale-[0.99]">
                    修正
                  </button>

                  <button className="w-full rounded-2xl py-4 text-base font-semibold bg-slate-100 text-slate-700 border border-slate-200 active:scale-[0.99]">
                    分析
                  </button>

                  <button className="w-full rounded-2xl py-4 text-base font-semibold bg-slate-100 text-slate-700 border border-slate-200 active:scale-[0.99]">
                    設定
                  </button>
                </div>

                {records.length > 0 && (
                  <div className="mt-5 rounded-2xl border border-slate-200 bg-white overflow-hidden">
                    <div className="px-4 py-3 text-sm font-semibold text-slate-700 border-b border-slate-100">
                      最新履歴
                    </div>
                    <div className="max-h-52 overflow-auto">
                      {records.slice(0, 5).map((record) => (
                        <div
                          key={record.id}
                          className="px-4 py-3 border-b last:border-b-0 border-slate-100"
                        >
                          <div className="text-sm font-semibold text-slate-800">
                            ¥{record.amount.toLocaleString("ja-JP")}
                          </div>
                          <div className="mt-1 text-xs text-slate-500">
                            {record.startAt.toLocaleTimeString("ja-JP", {
                              hour: "2-digit",
                              minute: "2-digit",
                            })}
                            {" → "}
                            {record.endAt.toLocaleTimeString("ja-JP", {
                              hour: "2-digit",
                              minute: "2-digit",
                            })}
                            {" ・ "}
                            {record.payment === "cash" ? "現金" : "カード・QR"}
                            {record.receipt ? " ・ 領収証あり" : ""}
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>
                )}
              </div>
            )}

            {screen === "ride" && (
              <div className="p-5 h-[calc(100%-77px)] flex flex-col overflow-hidden">
                <div className="rounded-2xl bg-sky-50 border border-sky-100 px-4 py-5 mb-6">
                  <div className="text-sm text-slate-500">状態</div>
                  <div className="mt-1 text-3xl font-bold text-slate-800">乗車中</div>
                  <div className="mt-2 text-sm text-slate-500">
                    開始{" "}
                    {rideStartAt?.toLocaleTimeString("ja-JP", {
                      hour: "2-digit",
                      minute: "2-digit",
                    })}{" "}
                    ・ 経過 {elapsedText}
                  </div>
                </div>

                <div className="flex-1 flex items-center">
                  <button
                    onClick={handleDropOff}
                    className="w-full rounded-[28px] bg-emerald-500 text-white py-10 text-3xl font-bold shadow-lg active:scale-[0.99]"
                  >
                    降車
                  </button>
                </div>

                <div className="pt-5">
                  <button
                    onClick={() => setScreen("top")}
                    className="w-full rounded-2xl py-4 text-base font-semibold bg-slate-100 text-slate-700 border border-slate-200 active:scale-[0.99]"
                  >
                    TOP
                  </button>
                </div>
              </div>
            )}

            {screen === "fare" && (
              <div className="p-5 h-[calc(100%-77px)] flex flex-col overflow-hidden">
                <div className="rounded-2xl bg-slate-50 border border-slate-200 px-4 py-4 mb-5">
                  <div className="text-sm text-slate-500">乗車情報</div>
                  <div className="mt-2 text-sm text-slate-600">
                    {rideStartAt?.toLocaleTimeString("ja-JP", {
                      hour: "2-digit",
                      minute: "2-digit",
                    })}
                    {" → "}
                    {rideEndAt?.toLocaleTimeString("ja-JP", {
                      hour: "2-digit",
                      minute: "2-digit",
                    })}
                  </div>
                </div>

                <div className="mb-4">
                  <label className="block text-sm text-slate-500 mb-2">金額</label>
                  <div className="relative">
                    <span className="absolute left-4 top-1/2 -translate-y-1/2 text-2xl font-bold text-slate-400">
                      ¥
                    </span>
                    <input
                      inputMode="numeric"
                      value={amount}
                      onChange={(e) => setAmount(e.target.value.replace(/[^\d]/g, ""))}
                      placeholder="0"
                      className="w-full rounded-[24px] border border-slate-200 bg-white pl-12 pr-4 py-6 text-4xl font-bold text-slate-800 outline-none focus:border-sky-300"
                    />
                  </div>
                </div>

                <button
                  type="button"
                  onClick={() => setReceipt((prev) => !prev)}
                  className={`w-full rounded-2xl py-4 mb-5 text-base font-semibold border ${
                    receipt
                      ? "bg-slate-200 text-slate-800 border-slate-300"
                      : "bg-[#ffd700] text-black border-[#e6c200]"
                  }`}
                >
                  領収証発行
                </button>

                <div className="text-sm text-slate-500 mb-2">支払い方法</div>
                <div className="grid grid-cols-2 gap-3 mt-auto">
                  <button
                    onClick={() => handleSaveFare("cash")}
                    className="rounded-[24px] bg-sky-500 text-white py-6 text-xl font-bold shadow-md active:scale-[0.99]"
                  >
                    現金
                  </button>
                  <button
                    onClick={() => handleSaveFare("cardQr")}
                    className="rounded-[24px] bg-slate-800 text-white py-6 text-xl font-bold shadow-md active:scale-[0.99]"
                  >
                    カード・QR
                  </button>
                </div>
              </div>
            )}
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<TaxiMiniAppMock />);
  </script>
</body>
</html>

<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no"
  />
  <title>Taxi Mini App</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #eef3f9;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      overflow: hidden;
      overscroll-behavior: none;
      -webkit-text-size-adjust: 100%;
    }

    body {
      touch-action: manipulation;
    }

    #root {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    button, input {
      font: inherit;
    }

    input[type="text"],
    input[type="time"],
    input[type="datetime-local"] {
      appearance: none;
      -webkit-appearance: none;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useEffect, useMemo, useRef, useState } = React;

    function TaxiMiniApp() {
      const [screen, setScreen] = useState("top"); // top | standby | ride | fare
      const [dutyStarted, setDutyStarted] = useState(false);
      const [isRiding, setIsRiding] = useState(false);

      const [rideStartAt, setRideStartAt] = useState(null);
      const [rideEndAt, setRideEndAt] = useState(null);

      const [pickup, setPickup] = useState("");
      const [dropoff, setDropoff] = useState("");

      const [amount, setAmount] = useState("");
      const [selectedPassengers, setSelectedPassengers] = useState(null);

      const [records, setRecords] = useState([]);
      const [showSaved, setShowSaved] = useState(false);
      const [showHistoryModal, setShowHistoryModal] = useState(false);
      const [showOtherSheet, setShowOtherSheet] = useState(false);

      const [historyMode, setHistoryMode] = useState("day"); // day | week | month
      const [historyFilter, setHistoryFilter] = useState("all"); // all | 1 | 2
      const [historyBaseDate, setHistoryBaseDate] = useState(new Date());
      const [expandedMonthDays, setExpandedMonthDays] = useState({});

      const [editingRecord, setEditingRecord] = useState(null);

      const [cardMode, setCardMode] = useState(3); // 1〜5
      const [workDate, setWorkDate] = useState(null);

      const amountInputRef = useRef(null);
      const savedTimerRef = useRef(null);
      const clockTimerRef = useRef(null);

      const [now, setNow] = useState(new Date());

      useEffect(() => {
        clockTimerRef.current = setInterval(() => {
          setNow(new Date());
        }, 600);

        return () => {
          if (clockTimerRef.current) clearInterval(clockTimerRef.current);
        };
      }, []);

      useEffect(() => {
        if (screen === "fare") {
          const timer = setTimeout(() => {
            amountInputRef.current?.focus();
          }, 120);
          return () => clearTimeout(timer);
        }
      }, [screen]);

      useEffect(() => {
        return () => {
          if (savedTimerRef.current) clearTimeout(savedTimerRef.current);
        };
      }, []);

      const timeParts = useMemo(() => {
        const hh = String(now.getHours()).padStart(2, "0");
        const mm = String(now.getMinutes()).padStart(2, "0");
        const showColon = Math.floor(now.getTime() / 600) % 2 === 0;
        return { hh, mm, showColon };
      }, [now]);

      const elapsedText = useMemo(() => {
        if (!rideStartAt) return "0分";
        const diffMs = now.getTime() - rideStartAt.getTime();
        const diffMin = Math.max(0, Math.floor(diffMs / 1000 / 60));
        return `${diffMin}分`;
      }, [rideStartAt, now]);

      const totalAmount = useMemo(() => {
        return records.reduce((sum, record) => sum + Number(record.amount || 0), 0);
      }, [records]);

      const recordCount = useMemo(() => {
        return records.length;
      }, [records]);

      const amount1 = useMemo(() => {
        return records
          .filter((record) => record.payment === "cash" && !record.receipt)
          .reduce((sum, record) => sum + Number(record.amount || 0), 0);
      }, [records]);

      const amount2 = useMemo(() => {
        return records
          .filter((record) => !(record.payment === "cash" && !record.receipt))
          .reduce((sum, record) => sum + Number(record.amount || 0), 0);
      }, [records]);

      const previewRecords = useMemo(() => records.slice(0, 3), [records]);

      const formatMoney = (value) => `¥${Number(value || 0).toLocaleString("ja-JP")}`;

      const formatTime = (dateValue) => {
        if (!dateValue) return "";
        return new Date(dateValue).toLocaleTimeString("ja-JP", {
          hour: "2-digit",
          minute: "2-digit",
        });
      };

      const formatShortDate = (dateValue) => {
        const d = new Date(dateValue);
        return `${d.getMonth() + 1}/${d.getDate()}`;
      };

      const formatFullDate = (dateValue) => {
        const d = new Date(dateValue);
        const week = ["日", "月", "火", "水", "木", "金", "土"][d.getDay()];
        return `${d.getMonth() + 1}/${d.getDate()}（${week}）`;
      };

      const formatMonthText = (dateValue) => {
        const d = new Date(dateValue);
        return `${d.getFullYear()}/${d.getMonth() + 1}`;
      };

      const formatDateTimeLocal = (dateValue) => {
        if (!dateValue) return "";
        const d = new Date(dateValue);
        const yyyy = d.getFullYear();
        const mm = String(d.getMonth() + 1).padStart(2, "0");
        const dd = String(d.getDate()).padStart(2, "0");
        const hh = String(d.getHours()).padStart(2, "0");
        const mi = String(d.getMinutes()).padStart(2, "0");
        return `${yyyy}-${mm}-${dd}T${hh}:${mi}`;
      };

      const recordType = (record) => {
        return record.payment === "cash" && !record.receipt ? "1" : "2";
      };

      const normalizePlaceLabel = (raw) => {
        if (!raw) return "未取得";
        if (raw === "取得中…" || raw === "未取得") return raw;

        let text = String(raw).trim();

        text = text
          .replace(/日本[,、]?/g, " ")
          .replace(/〒?\d{3}-?\d{4}/g, " ")
          .replace(/,/g, " ")
          .replace(/、/g, " ");

        text = text
          .replace(/広島県広島市/g, " ")
          .replace(/広島県/g, " ")
          .replace(/広島市/g, " ");

        text = text
          .replace(/中区/g, " ")
          .replace(/東区/g, " ")
          .replace(/南区/g, " ")
          .replace(/西区/g, " ")
          .replace(/安佐南区/g, " ")
          .replace(/安佐北区/g, " ")
          .replace(/安芸区/g, " ")
          .replace(/佐伯区/g, " ");

        text = text.replace(/\s+/g, " ").trim();

        const parts = text.split(" ").filter(Boolean);
        if (parts.length === 0) return "未取得";

        const chomeLike = parts.find((p) =>
          /[一二三四五六七八九十0-9０-９]+丁目/.test(p)
        );
        if (chomeLike) return chomeLike;

        const townLike = parts.find((p) =>
          /(町|本町|通|台|丘|浜|野|原|谷|峠|南|北|東|西)$/.test(p)
        );
        if (townLike) return townLike;

        if (parts.length >= 2) {
          const joined = `${parts[0]} ${parts[1]}`.trim();
          if (joined.length <= 18) return joined;
        }

        return parts[0];
      };

      const stateLabel = (() => {
        if (screen === "standby") return "乗車待機";
        if (screen === "ride") return "実車中";
        if (screen === "fare") return "金額入力";
        if (isRiding) return "実車中";
        if (dutyStarted) return "乗車待機";
        return "乗務開始前";
      })();

      const topMainLabel = !dutyStarted ? "乗務開始" : "乗務終了";
      const topMainButtonDisabled = screen === "top" && isRiding;

      const formattedAmount = useMemo(() => {
        if (!amount) return "";
        return Number(amount).toLocaleString("ja-JP");
      }, [amount]);

      const shadowSub = "shadow-[0_8px_16px_rgba(0,0,0,0.10)]";
      const cardClass = `rounded-[28px] bg-white/85 backdrop-blur border border-white/60 ${shadowSub}`;

      const mainButtonBase =
        "relative overflow-hidden w-full h-full rounded-[28px] text-white active:scale-[0.985] border border-white/60 shadow-[inset_0_2px_0_rgba(255,255,255,0.7),inset_0_-3px_8px_rgba(0,0,0,0.30),0_8px_16px_rgba(0,0,0,0.18)]";
      const mainButtonShine =
        "before:content-[''] before:absolute before:top-[6px] before:left-3 before:right-3 before:h-[40%] before:rounded-full before:bg-[linear-gradient(to_bottom,rgba(255,255,255,0.55),transparent)]";
      const bigButtonText = "text-[30px] font-extrabold tracking-[-0.03em]";

      const chipButtonBase =
        "relative overflow-hidden h-[46px] rounded-2xl border border-white/60 shadow-[inset_0_2px_0_rgba(255,255,255,0.65),inset_0_-2px_6px_rgba(0,0,0,0.20),0_5px_10px_rgba(0,0,0,0.12)] active:scale-[0.98]";

      const smallButtonBase =
        "relative overflow-hidden w-full h-[58px] rounded-[20px] border border-white/60 shadow-[inset_0_2px_0_rgba(255,255,255,0.65),inset_0_-2px_6px_rgba(0,0,0,0.20),0_6px_12px_rgba(0,0,0,0.14)] active:scale-[0.985]";

      const getLocationCandidates = async () => {
        if (!("geolocation" in navigator)) {
          return [{ label: "未取得", accuracy: null }];
        }

        const samples = [];
        const tryCount = 3;

        for (let i = 0; i < tryCount; i += 1) {
          try {
            const position = await new Promise((resolve, reject) => {
              navigator.geolocation.getCurrentPosition(
                resolve,
                reject,
                {
                  enableHighAccuracy: true,
                  timeout: 5000,
                  maximumAge: 0,
                }
              );
            });

            const latitude = position.coords.latitude;
            const longitude = position.coords.longitude;
            const accuracy = Number(position.coords.accuracy || 9999);

            let label = "未取得";
            try {
              const response = await fetch(
                `https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${latitude}&lon=${longitude}&accept-language=ja`
              );
              if (response.ok) {
                const data = await response.json();
                if (data.display_name) {
                  label = normalizePlaceLabel(data.display_name);
                } else {
                  const address = data.address || {};
                  const raw = [
                    address.prefecture || "",
                    address.city || address.town || address.village || "",
                    address.suburb || address.neighbourhood || address.quarter || "",
                    address.road || ""
                  ].filter(Boolean).join(" ");
                  label = normalizePlaceLabel(raw);
                }
              }
            } catch {
              label = "未取得";
            }

            samples.push({ label, accuracy });
          } catch {
            samples.push({ label: "未取得", accuracy: 9999 });
          }
        }

        return samples;
      };

      const getBestCurrentPlace = async () => {
        const candidates = await getLocationCandidates();
        const sorted = [...candidates].sort((a, b) => (a.accuracy ?? 9999) - (b.accuracy ?? 9999));
        return sorted[0] || { label: "未取得", accuracy: null };
      };

      const getDayStart = (dateValue) => {
        const d = new Date(dateValue);
        d.setHours(0, 0, 0, 0);
        return d;
      };

      const getWeekStart = (dateValue) => {
        const d = getDayStart(dateValue);
        const day = d.getDay();
        const diff = day === 0 ? -6 : 1 - day;
        d.setDate(d.getDate() + diff);
        return d;
      };

      const getWeekEnd = (dateValue) => {
        const d = getWeekStart(dateValue);
        d.setDate(d.getDate() + 6);
        d.setHours(23, 59, 59, 999);
        return d;
      };

      const getMonthStart = (dateValue) => {
        const d = new Date(dateValue);
        return new Date(d.getFullYear(), d.getMonth(), 1, 0, 0, 0, 0);
      };

      const getMonthEnd = (dateValue) => {
        const d = new Date(dateValue);
        return new Date(d.getFullYear(), d.getMonth() + 1, 0, 23, 59, 59, 999);
      };

      const isSameDay = (a, b) => {
        const da = new Date(a);
        const db = new Date(b);
        return (
          da.getFullYear() === db.getFullYear() &&
          da.getMonth() === db.getMonth() &&
          da.getDate() === db.getDate()
        );
      };

      const isInRange = (dateValue, start, end) => {
        const t = new Date(dateValue).getTime();
        return t >= start.getTime() && t <= end.getTime();
      };

      const getHistoryTargetDate = (record) => {
        return record.乗務日 ? new Date(record.乗務日) : new Date(record.乗車時刻);
      };

      const getHistoryPeriodText = () => {
        if (historyMode === "day") {
          return formatFullDate(historyBaseDate);
        }
        if (historyMode === "week") {
          const start = getWeekStart(historyBaseDate);
          const end = getWeekEnd(historyBaseDate);
          return `${formatShortDate(start)}〜${formatShortDate(end)}`;
        }
        return formatMonthText(historyBaseDate);
      };

      const filteredHistoryRecords = useMemo(() => {
        let list = [...records];

        if (historyFilter === "1") {
          list = list.filter((record) => recordType(record) === "1");
        } else if (historyFilter === "2") {
          list = list.filter((record) => recordType(record) === "2");
        }

        if (historyMode === "day") {
          list = list.filter((record) => isSameDay(getHistoryTargetDate(record), historyBaseDate));
        } else if (historyMode === "week") {
          const start = getWeekStart(historyBaseDate);
          const end = getWeekEnd(historyBaseDate);
          list = list.filter((record) => isInRange(getHistoryTargetDate(record), start, end));
        } else if (historyMode === "month") {
          const start = getMonthStart(historyBaseDate);
          const end = getMonthEnd(historyBaseDate);
          list = list.filter((record) => isInRange(getHistoryTargetDate(record), start, end));
        }

        return list.sort((a, b) => new Date(b.乗車時刻) - new Date(a.乗車時刻));
      }, [records, historyFilter, historyMode, historyBaseDate]);

      const historySummary = useMemo(() => {
        const total = filteredHistoryRecords.reduce((sum, record) => sum + Number(record.金額 || 0), 0);
        const count = filteredHistoryRecords.length;
        return { total, count };
      }, [filteredHistoryRecords]);

      const groupedHistory = useMemo(() => {
        const map = new Map();

        filteredHistoryRecords.forEach((record) => {
          const keyDate = getHistoryTargetDate(record);
          const key = `${keyDate.getFullYear()}-${String(keyDate.getMonth() + 1).padStart(2, "0")}-${String(keyDate.getDate()).padStart(2, "0")}`;

          if (!map.has(key)) {
            map.set(key, {
              key,
              date: new Date(keyDate.getFullYear(), keyDate.getMonth(), keyDate.getDate()),
              records: [],
              total: 0,
              count: 0,
            });
          }

          const group = map.get(key);
          group.records.push(record);
          group.total += Number(record.金額 || 0);
          group.count += 1;
        });

        return Array.from(map.values()).sort((a, b) => b.date - a.date);
      }, [filteredHistoryRecords]);

      useEffect(() => {
        if (!showHistoryModal) return;
        if (historyMode !== "month") return;

        const nextExpanded = {};
        groupedHistory.forEach((group, index) => {
          if (expandedMonthDays[group.key] === true) {
            nextExpanded[group.key] = true;
          } else if (index === 0) {
            nextExpanded[group.key] = true;
          }
        });
        setExpandedMonthDays(nextExpanded);
      }, [showHistoryModal, historyMode, groupedHistory]);

      const resetHistoryView = () => {
        setHistoryMode("day");
        setHistoryFilter("all");
        setHistoryBaseDate(workDate ? new Date(workDate) : new Date());
        setExpandedMonthDays({});
      };

      const openHistoryModal = () => {
        setShowOtherSheet(false);
        resetHistoryView();
        setEditingRecord(null);
        setShowHistoryModal(true);
      };

      const closeHistoryModal = () => {
        setEditingRecord(null);
        setShowHistoryModal(false);
      };

      const moveHistoryPeriod = (diff) => {
        const next = new Date(historyBaseDate);
        if (historyMode === "day") {
          next.setDate(next.getDate() + diff);
        } else if (historyMode === "week") {
          next.setDate(next.getDate() + diff * 7);
        } else {
          next.setMonth(next.getMonth() + diff);
        }
        setHistoryBaseDate(next);
      };

      const toggleMonthDay = (key) => {
        setExpandedMonthDays((prev) => ({
          ...prev,
          [key]: !prev[key],
        }));
      };

      const openEditRecord = (record) => {
        setEditingRecord({
          ...record,
          金額入力: String(record.金額 ?? ""),
          乗車時刻入力: formatDateTimeLocal(record.乗車時刻),
          降車時刻入力: formatDateTimeLocal(record.降車時刻),
          乗車地入力: record.乗車地 || "",
          降車地入力: record.降車地 || "",
          区分入力: recordType(record),
          人数入力: record.人数 || "",
        });
      };

      const closeEditRecord = () => {
        setEditingRecord(null);
      };

      const saveEditedRecord = () => {
        if (!editingRecord) return;

        const numericAmount = Number(String(editingRecord.金額入力 || "").replace(/[^\d]/g, ""));
        if (!numericAmount || numericAmount <= 0) {
          alert("正しい金額を入力してください");
          return;
        }

        if (!editingRecord.乗車時刻入力 || !editingRecord.降車時刻入力) {
          alert("時刻を入力してください");
          return;
        }

        const nextStartAt = new Date(editingRecord.乗車時刻入力);
        const nextEndAt = new Date(editingRecord.降車時刻入力);

        if (Number.isNaN(nextStartAt.getTime()) || Number.isNaN(nextEndAt.getTime())) {
          alert("時刻の形式が正しくありません");
          return;
        }

        if (nextEndAt.getTime() < nextStartAt.getTime()) {
          alert("降車時刻は乗車時刻より後にしてください");
          return;
        }

        let nextPayment = "cash";
        let nextReceipt = false;

        if (editingRecord.区分入力 === "1") {
          nextPayment = "cash";
          nextReceipt = false;
        } else {
          nextPayment = "cardQr";
          nextReceipt = false;
        }

        const updatedRecord = {
          ...editingRecord,
          id: editingRecord.id,
          乗務日: editingRecord.乗務日 || editingRecord.乗車時刻,
          乗車時刻: nextStartAt,
          降車時刻: nextEndAt,
          金額: numericAmount,
          決済方法: nextPayment,
          payment: nextPayment,
          領収証: nextReceipt,
          receipt: nextReceipt,
          乗車地: (editingRecord.乗車地入力 || "").trim() || "未取得",
          降車地: (editingRecord.降車地入力 || "").trim() || "未取得",
          人数: editingRecord.人数入力 === "" ? "" : Number(editingRecord.人数入力 || ""),
        };

        setRecords((prev) =>
          prev.map((record) => (record.id === updatedRecord.id ? updatedRecord : record))
        );

        setEditingRecord(null);
      };

      const deleteEditedRecord = () => {
        if (!editingRecord) return;
        const ok = window.confirm("この履歴を削除しますか？\n削除すると元に戻せません。");
        if (!ok) return;

        setRecords((prev) => prev.filter((record) => record.id !== editingRecord.id));
        setEditingRecord(null);
      };

      const handleCardModeNext = () => {
        setCardMode((prev) => (prev >= 5 ? 1 : prev + 1));
      };

      const handleDutyStart = () => {
        const startDutyDate = new Date();
        setDutyStarted(true);
        setIsRiding(false);
        setRideStartAt(null);
        setRideEndAt(null);
        setPickup("");
        setDropoff("");
        setAmount("");
        setSelectedPassengers(null);
        setScreen("standby");
        setWorkDate(startDutyDate);
      };

      const performDutyEnd = () => {
        setDutyStarted(false);
        setIsRiding(false);
        setRideStartAt(null);
        setRideEndAt(null);
        setPickup("");
        setDropoff("");
        setAmount("");
        setSelectedPassengers(null);
        setShowHistoryModal(false);
        setShowOtherSheet(false);
        setEditingRecord(null);
        setShowSaved(false);
        setWorkDate(null);
        setCardMode(3);
        setScreen("top");
      };

      const handleDutyEnd = () => {
        if (isRiding) return;
        const ok = window.confirm("乗務を終了しますか？");
        if (!ok) return;
        performDutyEnd();
      };

      const handleTopMain = () => {
        if (!dutyStarted) {
          handleDutyStart();
          return;
        }
        handleDutyEnd();
      };

      const handleStartRide = async () => {
        const start = new Date();
        setRideStartAt(start);
        setRideEndAt(null);
        setIsRiding(true);
        setPickup("取得中…");
        setDropoff("");
        setSelectedPassengers(null);
        setScreen("ride");

        const best = await getBestCurrentPlace();
        setPickup(best.label || "未取得");
      };

      const handleDropOff = async () => {
        const end = new Date();
        setRideEndAt(end);
        setAmount("");
        setDropoff("取得中…");
        setScreen("fare");

        const best = await getBestCurrentPlace();
        setDropoff(best.label || "未取得");
      };

      const handleAmountChange = (e) => {
        const raw = e.target.value.replace(/[^\d]/g, "");
        setAmount(raw);
      };

      const handlePassengerSelect = (count) => {
        setSelectedPassengers(count);
        amountInputRef.current?.blur();
      };

      const saveFare = (saveType) => {
        if (!rideStartAt || !rideEndAt) return;

        const numericAmount = Number(amount);
        if (!numericAmount || numericAmount <= 0) {
          alert("正しい金額を入力してください");
          return;
        }

        let payment = "cash";
        let receipt = false;

        if (saveType === "cash") {
          payment = "cash";
          receipt = false;
        } else if (saveType === "cardQr") {
          payment = "cardQr";
          receipt = false;
        } else if (saveType === "receipt") {
          payment = "cardQr";
          receipt = true;
        }

        const newRecord = {
          id: Date.now(),
          乗務日: workDate || new Date(),
          乗車時刻: rideStartAt,
          降車時刻: rideEndAt,
          乗車地: pickup.trim() || "未取得",
          降車地: dropoff.trim() || "未取得",
          人数: selectedPassengers === null ? "" : selectedPassengers,
          金額: numericAmount,
          決済方法: payment,
          payment,
          領収証: receipt,
          receipt,
          天気: "",
          乗車位置精度: null,
          降車位置精度: null,
        };

        setRecords((prev) => [newRecord, ...prev]);
        setIsRiding(false);
        setRideStartAt(null);
        setRideEndAt(null);
        setPickup("");
        setDropoff("");
        setAmount("");
        setSelectedPassengers(null);
        setScreen("standby");

        setShowSaved(true);
        if (savedTimerRef.current) clearTimeout(savedTimerRef.current);
        savedTimerRef.current = setTimeout(() => {
          setShowSaved(false);
        }, 2200);
      };

      const renderHistoryRecordCard = (record) => {
        const type = recordType(record);

        return (
          <button
            key={record.id}
            type="button"
            onClick={() => openEditRecord(record)}
            className={`w-full text-left rounded-2xl border border-slate-200 bg-white p-4 active:bg-slate-50 ${shadowSub}`}
          >
            <div className="flex items-start justify-between gap-3">
              <div className="min-w-0">
                <div className="text-xl font-bold text-slate-800">
                  {formatMoney(record.金額)}
                </div>
                <div className="mt-1 text-xs text-slate-500">
                  {formatTime(record.乗車時刻)} → {formatTime(record.降車時刻)}
                </div>
              </div>

              <div className="shrink-0 text-right">
                <div
                  className={`inline-flex min-w-[34px] justify-center rounded-full px-2.5 py-1 text-xs font-bold ${
                    type === "1"
                      ? "bg-sky-100 text-sky-700"
                      : "bg-emerald-100 text-emerald-700"
                  }`}
                >
                  {type === "1" ? "①" : "②"}
                </div>
                <div className="mt-2 text-[11px] text-slate-500">
                  {type === "1" ? "現金" : "カード・QR / 領収証"}
                </div>
              </div>
            </div>

            <div className="mt-3 grid gap-1 text-sm text-slate-600">
              <div className="truncate">乗車地：{record.乗車地 || "未取得"}</div>
              <div className="truncate">降車地：{record.降車地 || "未取得"}</div>
              <div className="truncate text-xs text-slate-400">
                乗務日：{formatFullDate(record.乗務日 || record.乗車時刻)}
              </div>
            </div>
          </button>
        );
      };

      const renderCardModeContent = () => {
        if (cardMode === 1) {
          return (
            <div className="mt-4 flex-1 min-h-0 flex flex-col justify-end">
              <div className="text-[12px] font-medium text-slate-500">
                売上合計
              </div>
              <div className="mt-1 flex items-end justify-between gap-3">
                <div className="text-[16px] leading-none font-normal text-slate-600">
                  {formatMoney(totalAmount)}
                </div>
                <div className="text-[12px] leading-none font-normal text-slate-500">
                  {recordCount}件
                </div>
              </div>
            </div>
          );
        }

        if (cardMode === 2) {
          return (
            <div className="mt-4 flex-1 min-h-0 flex flex-col justify-end">
              <div className="text-[12px] font-medium text-slate-500">
                売上目標達成率
              </div>
              <div className="mt-1 text-[16px] leading-none font-normal text-slate-600">
                -- %
              </div>
            </div>
          );
        }

        if (cardMode === 3) {
          return (
            <div className="mt-4 flex-1 min-h-0 flex flex-col justify-end">
              <div className="text-[12px] font-medium text-slate-500">
                今日のペース
              </div>
              <div className="mt-1 text-[16px] leading-none font-normal text-[#00a676]">
                良好
              </div>
            </div>
          );
        }

        if (cardMode === 4) {
          return (
            <div className="mt-4 flex-1 min-h-0 flex flex-col justify-end">
              <div className="text-[12px] font-medium text-slate-500">
                ① 売上
              </div>
              <div className="mt-1 text-[16px] leading-none font-normal text-slate-600">
                {formatMoney(amount1)}
              </div>
            </div>
          );
        }

        return (
          <div className="mt-4 flex-1 min-h-0 flex flex-col justify-end">
            <div className="text-[12px] font-medium text-slate-500">
              ② 売上
            </div>
            <div className="mt-1 text-[16px] leading-none font-normal text-slate-600">
              {formatMoney(amount2)}
            </div>
          </div>
        );
      };

      const renderPreviewHistoryRows = () => {
        if (previewRecords.length === 0) {
          return (
            <div className="px-4 py-4 text-sm text-slate-400">
              まだ履歴はありません
            </div>
          );
        }

        return previewRecords.map((record) => (
          <div
            key={record.id}
            className="px-4 py-3 border-b last:border-b-0 border-slate-100"
          >
            <div className="flex items-start justify-between gap-3">
              <div className="text-[15px] font-normal text-slate-700">
                {formatMoney(record.金額)}
              </div>
              <div className="text-xs text-slate-500 shrink-0">
                {recordType(record) === "1" ? "①" : "②"}
              </div>
            </div>
            <div className="mt-1 text-xs text-slate-500">
              {formatTime(record.乗車時刻)} → {formatTime(record.降車時刻)}
            </div>
          </div>
        ));
      };

      const renderBottomCard = () => {
        return (
          <div className="pt-3 h-[220px] shrink-0">
            <div className={`${cardClass} h-full overflow-hidden flex flex-col`}>
              <button
                type="button"
                onClick={() => setShowOtherSheet(true)}
                className="px-4 pt-3 pb-2 text-left shrink-0 active:bg-slate-50"
              >
                <div className="text-sm font-medium text-slate-400">その他</div>
              </button>

              <div className="flex-1 min-h-0 overflow-y-auto">
                <button
                  type="button"
                  onClick={openHistoryModal}
                  className="w-full text-left active:bg-slate-50"
                >
                  {renderPreviewHistoryRows()}
                </button>
              </div>
            </div>
          </div>
        );
      };

      return (
        <div className="w-full h-full bg-[linear-gradient(180deg,#eef3f9,#e2e8f0)] flex justify-center overflow-hidden">
          <div className="w-full max-w-sm h-full px-4 pt-4 pb-3 relative overflow-hidden">
            {showSaved && (
              <div className="absolute top-4 left-1/2 -translate-x-1/2 z-30 rounded-full bg-emerald-500 text-white text-sm font-bold px-5 py-2.5 shadow-lg">
                保存しました
              </div>
            )}

            {showOtherSheet && (
              <div
                className="absolute inset-0 z-30 bg-slate-900/40 flex items-end"
                onClick={() => setShowOtherSheet(false)}
              >
                <div
                  className="w-full rounded-t-[28px] bg-white shadow-2xl overflow-hidden"
                  onClick={(e) => e.stopPropagation()}
                >
                  <div className="px-4 pt-3 pb-4">
                    <div className="w-12 h-1.5 rounded-full bg-slate-200 mx-auto mb-3"></div>

                    <div className="flex items-center justify-between">
                      <div className="text-base font-bold text-slate-800">その他</div>
                      <button
                        type="button"
                        onClick={() => setShowOtherSheet(false)}
                        className="px-3 py-2 rounded-xl bg-slate-100 text-slate-700 text-sm font-semibold"
                      >
                        閉じる
                      </button>
                    </div>

                    <div className="mt-4 overflow-hidden rounded-2xl border border-slate-200 bg-white">
                      <button
                        type="button"
                        className="w-full px-4 py-4 text-left text-base font-semibold text-slate-800 border-b border-slate-100 active:bg-slate-50"
                      >
                        分析
                      </button>
                      <button
                        type="button"
                        className="w-full px-4 py-4 text-left text-base font-semibold text-slate-800 border-b border-slate-100 active:bg-slate-50"
                      >
                        設定
                      </button>
                      <button
                        type="button"
                        onClick={openHistoryModal}
                        className="w-full px-4 py-4 text-left text-base font-semibold text-slate-800 active:bg-slate-50"
                      >
                        履歴
                      </button>
                    </div>
                  </div>
                </div>
              </div>
            )}

            {showHistoryModal && (
              <div className="absolute inset-0 z-40 bg-slate-900/40 flex items-end">
                <div className="w-full h-[78svh] rounded-t-[28px] bg-white shadow-2xl flex flex-col overflow-hidden">
                  {!editingRecord ? (
                    <>
                      <div className="px-4 pt-3 pb-2 border-b border-slate-100 shrink-0">
                        <div className="w-12 h-1.5 rounded-full bg-slate-200 mx-auto mb-3"></div>

                        <div className="flex items-center justify-between">
                          <div className="text-lg font-bold text-slate-800">履歴一覧</div>
                          <button
                            type="button"
                            onClick={closeHistoryModal}
                            className="px-3 py-2 rounded-xl bg-slate-100 text-slate-700 text-sm font-semibold"
                          >
                            閉じる
                          </button>
                        </div>

                        <div className="mt-3 grid gap-2">
                          <div className="grid grid-cols-3 gap-2">
                            <button
                              type="button"
                              onClick={() => setHistoryMode("day")}
                              className={`h-[42px] rounded-2xl text-sm font-bold border ${
                                historyMode === "day"
                                  ? "bg-slate-800 text-white border-slate-800"
                                  : "bg-slate-100 text-slate-700 border-slate-200"
                              }`}
                            >
                              日
                            </button>
                            <button
                              type="button"
                              onClick={() => setHistoryMode("week")}
                              className={`h-[42px] rounded-2xl text-sm font-bold border ${
                                historyMode === "week"
                                  ? "bg-slate-800 text-white border-slate-800"
                                  : "bg-slate-100 text-slate-700 border-slate-200"
                              }`}
                            >
                              週
                            </button>
                            <button
                              type="button"
                              onClick={() => setHistoryMode("month")}
                              className={`h-[42px] rounded-2xl text-sm font-bold border ${
                                historyMode === "month"
                                  ? "bg-slate-800 text-white border-slate-800"
                                  : "bg-slate-100 text-slate-700 border-slate-200"
                              }`}
                            >
                              月
                            </button>
                          </div>

                          <div className="grid grid-cols-[48px_1fr_48px] gap-2 items-center">
                            <button
                              type="button"
                              onClick={() => moveHistoryPeriod(-1)}
                              className="h-[42px] rounded-2xl bg-slate-100 border border-slate-200 text-slate-700 text-lg font-bold"
                            >
                              ←
                            </button>
                            <div className="h-[42px] rounded-2xl bg-slate-50 border border-slate-200 flex items-center justify-center px-3 text-sm font-bold text-slate-800">
                              {getHistoryPeriodText()}
                            </div>
                            <button
                              type="button"
                              onClick={() => moveHistoryPeriod(1)}
                              className="h-[42px] rounded-2xl bg-slate-100 border border-slate-200 text-slate-700 text-lg font-bold"
                            >
                              →
                            </button>
                          </div>

                          <div className="grid grid-cols-3 gap-2">
                            <button
                              type="button"
                              onClick={() => setHistoryFilter("all")}
                              className={`h-[40px] rounded-2xl text-sm font-bold border ${
                                historyFilter === "all"
                                  ? "bg-sky-500 text-white border-sky-500"
                                  : "bg-white text-slate-700 border-slate-200"
                              }`}
                            >
                              すべて
                            </button>
                            <button
                              type="button"
                              onClick={() => setHistoryFilter("1")}
                              className={`h-[40px] rounded-2xl text-sm font-bold border ${
                                historyFilter === "1"
                                  ? "bg-sky-500 text-white border-sky-500"
                                  : "bg-white text-slate-700 border-slate-200"
                              }`}
                            >
                              ①
                            </button>
                            <button
                              type="button"
                              onClick={() => setHistoryFilter("2")}
                              className={`h-[40px] rounded-2xl text-sm font-bold border ${
                                historyFilter === "2"
                                  ? "bg-sky-500 text-white border-sky-500"
                                  : "bg-white text-slate-700 border-slate-200"
                              }`}
                            >
                              ②
                            </button>
                          </div>

                          <div className="rounded-2xl bg-slate-50 border border-slate-200 px-4 py-3 flex items-center justify-between">
                            <div className="text-sm text-slate-600">件数 {historySummary.count}件</div>
                            <div className="text-base font-bold text-slate-800">
                              {formatMoney(historySummary.total)}
                            </div>
                          </div>
                        </div>
                      </div>

                      <div className="flex-1 overflow-y-auto px-4 py-3">
                        {filteredHistoryRecords.length === 0 ? (
                          <div className="rounded-2xl border border-slate-200 bg-slate-50 p-4 text-sm text-slate-500">
                            該当する履歴はありません
                          </div>
                        ) : historyMode === "month" ? (
                          <div className="grid gap-3">
                            {groupedHistory.map((group) => {
                              const opened = expandedMonthDays[group.key] === true;
                              return (
                                <div key={group.key} className="grid gap-2">
                                  <button
                                    type="button"
                                    onClick={() => toggleMonthDay(group.key)}
                                    className={`w-full rounded-2xl border border-slate-200 bg-white px-4 py-3 text-left active:bg-slate-50 ${shadowSub}`}
                                  >
                                    <div className="flex items-center justify-between gap-3">
                                      <div className="min-w-0">
                                        <div className="text-[18px] font-bold text-slate-800">
                                          {formatFullDate(group.date)}
                                        </div>
                                        <div className="mt-1 text-xs text-slate-500">
                                          {group.count}件
                                        </div>
                                      </div>
                                      <div className="shrink-0 text-right">
                                        <div className="text-base font-bold text-slate-800">
                                          {formatMoney(group.total)}
                                        </div>
                                        <div className="mt-1 text-xs font-semibold text-slate-500">
                                          {opened ? "閉じる" : "開く"}
                                        </div>
                                      </div>
                                    </div>
                                  </button>

                                  {opened && (
                                    <div className="pl-3 grid gap-2">
                                      {group.records.map((record) => renderHistoryRecordCard(record))}
                                    </div>
                                  )}
                                </div>
                              );
                            })}
                          </div>
                        ) : (
                          <div className="grid gap-4">
                            {groupedHistory.map((group) => (
                              <div key={group.key} className="grid gap-2">
                                <div className="pt-2">
                                  <div className="text-[19px] font-bold text-slate-800 tracking-[-0.01em]">
                                    {formatFullDate(group.date)}
                                  </div>
                                  <div className="mt-1 text-xs text-slate-500">
                                    {group.count}件 ・ {formatMoney(group.total)}
                                  </div>
                                </div>

                                <div className="grid gap-2">
                                  {group.records.map((record) => renderHistoryRecordCard(record))}
                                </div>
                              </div>
                            ))}
                          </div>
                        )}
                      </div>
                    </>
                  ) : (
                    <>
                      <div className="px-4 pt-3 pb-2 border-b border-slate-100 shrink-0">
                        <div className="w-12 h-1.5 rounded-full bg-slate-200 mx-auto mb-3"></div>

                        <div className="flex items-center justify-between">
                          <button
                            type="button"
                            onClick={closeEditRecord}
                            className="px-3 py-2 rounded-xl bg-slate-100 text-slate-700 text-sm font-semibold"
                          >
                            戻る
                          </button>
                          <div className="text-lg font-bold text-slate-800">履歴修正</div>
                          <button
                            type="button"
                            onClick={saveEditedRecord}
                            className="px-3 py-2 rounded-xl bg-sky-500 text-white text-sm font-bold"
                          >
                            保存
                          </button>
                        </div>
                      </div>

                      <div className="flex-1 overflow-y-auto px-4 py-3">
                        <div className="grid gap-3">
                          <div className={`rounded-2xl border border-slate-200 bg-white p-4 ${shadowSub}`}>
                            <div className="text-xs font-semibold text-slate-500">対象履歴</div>
                            <div className="mt-2 text-[18px] font-bold text-slate-800">
                              {formatFullDate(editingRecord.乗務日 || editingRecord.乗車時刻)}
                            </div>
                            <div className="mt-1 text-sm text-slate-500">
                              {formatTime(editingRecord.乗車時刻)} → {formatTime(editingRecord.降車時刻)}
                            </div>
                          </div>

                          <div className={`rounded-2xl border border-slate-200 bg-white p-4 ${shadowSub}`}>
                            <div className="text-sm font-semibold text-slate-600">金額</div>
                            <div className="mt-2 relative">
                              <span className="absolute left-4 top-1/2 -translate-y-1/2 text-2xl font-bold text-slate-400">¥</span>
                              <input
                                type="text"
                                inputMode="numeric"
                                value={Number(editingRecord.金額入力 || 0).toLocaleString("ja-JP")}
                                onChange={(e) => {
                                  const raw = e.target.value.replace(/[^\d]/g, "");
                                  setEditingRecord((prev) => ({ ...prev, 金額入力: raw }));
                                }}
                                className="w-full rounded-2xl border border-slate-300 pl-12 pr-4 py-4 text-3xl font-bold text-slate-800 outline-none focus:border-sky-300"
                              />
                            </div>
                          </div>

                          <div className={`rounded-2xl border border-slate-200 bg-white p-4 ${shadowSub}`}>
                            <div className="text-sm font-semibold text-slate-600">区分</div>
                            <div className="mt-3 grid grid-cols-2 gap-2">
                              <button
                                type="button"
                                onClick={() => setEditingRecord((prev) => ({ ...prev, 区分入力: "1" }))}
                                className={`h-[52px] rounded-2xl text-lg font-bold border ${
                                  editingRecord.区分入力 === "1"
                                    ? "bg-sky-500 text-white border-sky-500"
                                    : "bg-slate-50 text-slate-700 border-slate-200"
                                }`}
                              >
                                ①
                              </button>
                              <button
                                type="button"
                                onClick={() => setEditingRecord((prev) => ({ ...prev, 区分入力: "2" }))}
                                className={`h-[52px] rounded-2xl text-lg font-bold border ${
                                  editingRecord.区分入力 === "2"
                                    ? "bg-emerald-500 text-white border-emerald-500"
                                    : "bg-slate-50 text-slate-700 border-slate-200"
                                }`}
                              >
                                ②
                              </button>
                            </div>
                            <div className="mt-2 text-xs text-slate-500">
                              ①＝現金・領収証なし　②＝カード/QR・領収証あり含む
                            </div>
                          </div>

                          <div className={`rounded-2xl border border-slate-200 bg-white p-4 ${shadowSub}`}>
                            <div className="text-sm font-semibold text-slate-600">人数</div>
                            <div className="mt-3 grid grid-cols-4 gap-2">
                              {[1,2,3,4].map((count) => (
                                <button
                                  key={count}
                                  type="button"
                                  onClick={() => setEditingRecord((prev) => ({ ...prev, 人数入力: count }))}
                                  className={`h-[46px] rounded-2xl text-lg font-bold border ${
                                    Number(editingRecord.人数入力) === count
                                      ? "bg-sky-500 text-white border-sky-500"
                                      : "bg-slate-50 text-slate-700 border-slate-200"
                                  }`}
                                >
                                  {count}
                                </button>
                              ))}
                            </div>
                          </div>

                          <div className={`rounded-2xl border border-slate-200 bg-white p-4 ${shadowSub}`}>
                            <div className="text-sm font-semibold text-slate-600">乗車地</div>
                            <input
                              type="text"
                              value={editingRecord.乗車地入力}
                              onChange={(e) =>
                                setEditingRecord((prev) => ({ ...prev, 乗車地入力: e.target.value }))
                              }
                              className="mt-2 w-full rounded-2xl border border-slate-300 px-4 py-3 text-base text-slate-800 outline-none focus:border-sky-300"
                            />
                          </div>

                          <div className={`rounded-2xl border border-slate-200 bg-white p-4 ${shadowSub}`}>
                            <div className="text-sm font-semibold text-slate-600">降車地</div>
                            <input
                              type="text"
                              value={editingRecord.降車地入力}
                              onChange={(e) =>
                                setEditingRecord((prev) => ({ ...prev, 降車地入力: e.target.value }))
                              }
                              className="mt-2 w-full rounded-2xl border border-slate-300 px-4 py-3 text-base text-slate-800 outline-none focus:border-sky-300"
                            />
                          </div>

                          <div className={`rounded-2xl border border-slate-200 bg-white p-4 ${shadowSub}`}>
                            <div className="text-sm font-semibold text-slate-600">乗車時刻</div>
                            <input
                              type="datetime-local"
                              value={editingRecord.乗車時刻入力}
                              onChange={(e) =>
                                setEditingRecord((prev) => ({ ...prev, 乗車時刻入力: e.target.value }))
                              }
                              className="mt-2 w-full rounded-2xl border border-slate-300 px-4 py-3 text-base text-slate-800 outline-none focus:border-sky-300"
                            />
                          </div>

                          <div className={`rounded-2xl border border-slate-200 bg-white p-4 ${shadowSub}`}>
                            <div className="text-sm font-semibold text-slate-600">降車時刻</div>
                            <input
                              type="datetime-local"
                              value={editingRecord.降車時刻入力}
                              onChange={(e) =>
                                setEditingRecord((prev) => ({ ...prev, 降車時刻入力: e.target.value }))
                              }
                              className="mt-2 w-full rounded-2xl border border-slate-300 px-4 py-3 text-base text-slate-800 outline-none focus:border-sky-300"
                            />
                          </div>

                          <button
                            type="button"
                            onClick={saveEditedRecord}
                            className={`w-full rounded-2xl h-[56px] text-xl font-bold bg-sky-500 text-white ${shadowSub}`}
                          >
                            保存する
                          </button>

                          <button
                            type="button"
                            onClick={deleteEditedRecord}
                            className={`w-full rounded-2xl h-[52px] text-base font-bold bg-red-50 text-red-600 border border-red-200 ${shadowSub}`}
                          >
                            この履歴を削除
                          </button>
                        </div>
                      </div>
                    </>
                  )}
                </div>
              </div>
            )}

            <div className="h-full flex flex-col overflow-hidden">
              {(screen === "top" || screen === "standby" || screen === "ride") && (
                <>
                  <div
                    className={`${cardClass} h-[172px] px-4 py-4 shrink-0 overflow-hidden`}
                    onClick={handleCardModeNext}
                  >
                    <div className="h-full flex flex-col">
                      <div className="flex items-start justify-between gap-4 shrink-0">
                        <div className="min-w-0">
                          <div className="text-[15px] leading-none font-semibold text-slate-700 pt-1">
                            {stateLabel}
                          </div>
                        </div>

                        <div className="shrink-0 text-right">
                          <div className="flex items-center justify-end text-[58px] leading-[0.9] font-black tracking-[-0.05em] text-slate-800">
                            <span>{timeParts.hh}</span>
                            <span
                              className={`${timeParts.showColon ? "opacity-100" : "opacity-0"} transition-opacity duration-150 mx-[-0.08em]`}
                            >
                              ：
                            </span>
                            <span>{timeParts.mm}</span>
                          </div>
                        </div>
                      </div>

                      {renderCardModeContent()}
                    </div>
                  </div>

                  <div className="h-[132px] pt-4 shrink-0">
                    {screen === "top" && (
                      <button
                        type="button"
                        onClick={handleTopMain}
                        disabled={topMainButtonDisabled}
                        className={`${mainButtonBase} ${mainButtonShine} ${
                          topMainButtonDisabled
                            ? "bg-[linear-gradient(180deg,#d5dbe3,#bcc6d2,#97a3b2)] text-white"
                            : dutyStarted
                            ? "bg-[linear-gradient(180deg,#ffdf6b,#ffb100,#cc7900)] text-white"
                            : "bg-[linear-gradient(180deg,#5dffcf,#21c79a,#008a6a)] text-white"
                        }`}
                      >
                        <span className={bigButtonText}>{topMainLabel}</span>
                      </button>
                    )}

                    {screen === "standby" && (
                      <button
                        type="button"
                        onClick={handleStartRide}
                        className={`${mainButtonBase} ${mainButtonShine} bg-[linear-gradient(180deg,#5ecbff,#2fa8ff,#0072d9)]`}
                      >
                        <span className={bigButtonText}>実車</span>
                      </button>
                    )}

                    {screen === "ride" && (
                      <button
                        type="button"
                        onClick={handleDropOff}
                        className={`${mainButtonBase} ${mainButtonShine} bg-[linear-gradient(180deg,#ffe066,#ffb400,#cc7a00)]`}
                      >
                        <span className={bigButtonText}>降車</span>
                      </button>
                    )}
                  </div>
                </>
              )}

              {screen === "ride" && (
                <div className="pt-3 shrink-0">
                  <div className={`${cardClass} px-4 py-3`}>
                    <div className="text-[14px] font-semibold text-slate-500">
                      乗車地
                    </div>
                    <div className="mt-1 text-[18px] font-bold text-slate-800">
                      {pickup || "未取得"}
                    </div>

                    <div className="mt-3 grid grid-cols-3 gap-3">
                      <div>
                        <div className="text-[13px] font-semibold text-slate-500">
                          乗車時刻
                        </div>
                        <div className="mt-1 text-[17px] font-bold text-slate-800">
                          {formatTime(rideStartAt)}
                        </div>
                      </div>

                      <div>
                        <div className="text-[13px] font-semibold text-slate-500">
                          人数
                        </div>
                        <div className="mt-1 text-[17px] font-bold text-slate-800">
                          {selectedPassengers ? `${selectedPassengers}人` : ""}
                        </div>
                      </div>

                      <div className="text-right">
                        <div className="text-[13px] font-semibold text-slate-500">
                          経過時間
                        </div>
                        <div className="mt-1 text-[17px] font-bold text-slate-800">
                          {elapsedText}
                        </div>
                      </div>
                    </div>
                  </div>
                </div>
              )}

              {screen === "fare" && (
                <div className="flex-1 min-h-0 flex flex-col overflow-hidden">
                  <div className={`${cardClass} h-[128px] px-4 py-4 shrink-0`}>
                    <div className="flex items-start justify-center gap-6">
                      <div className="flex-1 min-w-0 text-left">
                        <div className="text-[26px] font-bold text-slate-800 leading-none">
                          {formatTime(rideStartAt)}
                        </div>
                        <div className="mt-3 text-[15px] font-semibold text-slate-600 truncate">
                          {pickup || "未取得"}
                        </div>
                      </div>

                      <div className="pt-1 text-[22px] font-bold text-slate-400 shrink-0">
                        →
                      </div>

                      <div className="flex-1 min-w-0 text-right">
                        <div className="text-[26px] font-bold text-slate-800 leading-none">
                          {formatTime(rideEndAt)}
                        </div>
                        <div className="mt-3 text-[15px] font-semibold text-slate-600 truncate">
                          {dropoff || "未取得"}
                        </div>
                      </div>
                    </div>
                  </div>

                  <div className="pt-4 shrink-0">
                    <div className="relative">
                      <span className="absolute left-4 top-1/2 -translate-y-1/2 text-2xl font-bold text-slate-400">
                        ¥
                      </span>
                      <input
                        ref={amountInputRef}
                        type="text"
                        inputMode="numeric"
                        value={formattedAmount}
                        onChange={handleAmountChange}
                        placeholder="0"
                        className={`w-full rounded-[24px] border border-white/60 bg-white pl-12 pr-4 py-5 text-4xl font-bold text-slate-800 outline-none shadow-[0_8px_16px_rgba(0,0,0,0.10)] focus:border-sky-300`}
                      />
                    </div>
                  </div>

                  <div className="pt-4 flex-1 min-h-0 flex flex-col overflow-hidden">
                    <div className="grid gap-3 shrink-0">
                      <div className="grid grid-cols-4 gap-2">
                        {[1, 2, 3, 4].map((count) => {
                          const selected = selectedPassengers === count;
                          return (
                            <button
                              key={count}
                              type="button"
                              onClick={() => handlePassengerSelect(count)}
                              className={`${chipButtonBase} ${
                                selected
                                  ? "text-slate-800 bg-[linear-gradient(180deg,#e6ebf1,#d8dee7,#c9d1dc)]"
                                  : "text-slate-600 bg-[linear-gradient(180deg,#f4f6f8,#eceff3,#e2e8f0)]"
                              }`}
                            >
                              <span className="relative z-10">{count}</span>
                            </button>
                          );
                        })}
                      </div>

                      <button
                        type="button"
                        onClick={() => saveFare("cash")}
                        className={`${smallButtonBase} text-white text-xl font-extrabold bg-[linear-gradient(180deg,#5ecbff,#2fa8ff,#0072d9)]`}
                      >
                        <span className="relative z-10">現金</span>
                      </button>

                      <button
                        type="button"
                        onClick={() => saveFare("cardQr")}
                        className={`${smallButtonBase} text-white text-xl font-extrabold bg-[linear-gradient(180deg,#5dffcf,#21c79a,#008a6a)]`}
                      >
                        <span className="relative z-10">カード・QR</span>
                      </button>

                      <button
                        type="button"
                        onClick={() => saveFare("receipt")}
                        className={`${smallButtonBase} text-white text-xl font-extrabold bg-[linear-gradient(180deg,#ff7a7a,#ff3b3b,#b80000)]`}
                      >
                        <span className="relative z-10">領収証発行</span>
                      </button>
                    </div>

                    <div className="flex-1 min-h-0"></div>
                    <div className="h-2 shrink-0"></div>
                  </div>
                </div>
              )}

              {(screen === "top" || screen === "standby" || screen === "ride") && (
                <>
                  <div className="flex-1 min-h-0"></div>
                  {renderBottomCard()}
                </>
              )}
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<TaxiMiniApp />);
  </script>
</body>
</html>

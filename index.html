<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>タクシー記録</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  background: #f5f7f8;
  font-family: sans-serif;
}

.wrap {
  max-width: 430px;
  margin: 0 auto;
  padding: 24px 16px;
}

/* ボタン共通 */
.btn {
  width: 100%;
  border: none;
  border-radius: 20px;
  padding: 34px 16px;
  font-size: 28px;
  font-weight: bold;
  margin-bottom: 16px;
}

/* 状態ボタン */
.ride { background: #6ea8e5; color: #fff; }
.drop { background: #6fb063; color: #111; }

/* 金額 */
.price-input {
  width: 100%;
  border-radius: 20px;
  border: 1px solid #ccc;
  font-size: 32px;
  text-align: center;
  padding: 28px;
  margin-bottom: 20px;
}

/* 決済ボタン */
.pay-btn {
  width: 100%;
  border-radius: 20px;
  padding: 34px 16px;
  font-size: 26px;
  font-weight: bold;
  margin-bottom: 14px;
  border: none;
}

/* 色 */
.cash { background: #ffc107; }
.credit { background: #6aa84f; color: #fff; }
.receipt { background: #ffeb3b; }

/* 非表示 */
.hidden { display: none; }

/* トースト */
.toast {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: #222;
  color: #fff;
  padding: 14px 18px;
  border-radius: 12px;
  display: none;
}

.toast.show { display: block; }

.undo {
  margin-left: 10px;
  color: #8fb2ff;
  background: none;
  border: none;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="wrap">

  <!-- 乗車 -->
  <button id="rideBtn" class="btn ride">乗車</button>

  <!-- 降車 -->
  <button id="dropBtn" class="btn drop">降車</button>

  <!-- 金額 -->
  <input id="priceInput" class="price-input hidden" type="tel" placeholder="金額入力">

  <!-- 決済 -->
  <div id="payArea" class="hidden">
    <button class="pay-btn cash" data-pay="現金">現金</button>
    <button class="pay-btn credit" data-pay="売掛">売掛</button>
    <button class="pay-btn receipt" data-pay="領収書">領収書発行</button>
  </div>

</div>

<!-- トースト -->
<div id="toast" class="toast">
  <span id="toastText"></span>
  <button id="undo" class="undo">戻る</button>
</div>

<script>
let state = "idle";
let timer = null;

const rideBtn = document.getElementById("rideBtn");
const dropBtn = document.getElementById("dropBtn");
const priceInput = document.getElementById("priceInput");
const payArea = document.getElementById("payArea");
const toast = document.getElementById("toast");
const toastText = document.getElementById("toastText");
const undo = document.getElementById("undo");

/* UI更新 */
function updateUI() {

  if (state === "idle") {
    rideBtn.style.display = "block";
    dropBtn.style.display = "none";
    priceInput.classList.add("hidden");
    payArea.classList.add("hidden");
  }

  if (state === "riding") {
    rideBtn.style.display = "none";
    dropBtn.style.display = "block";
  }

  if (state === "after_drop") {
    rideBtn.style.display = "none";
    dropBtn.style.display = "none";
    priceInput.classList.remove("hidden");

    if (priceInput.value !== "") {
      payArea.classList.remove("hidden");
    } else {
      payArea.classList.add("hidden");
    }
  }
}

/* 乗車 */
rideBtn.onclick = () => {
  state = "riding";
  updateUI();
};

/* 降車 */
dropBtn.onclick = () => {
  state = "after_drop";
  updateUI();
  setTimeout(() => priceInput.focus(), 100);
};

/* 金額入力 */
priceInput.oninput = () => {
  priceInput.value = priceInput.value.replace(/[^\d]/g, "");
  updateUI();
};

/* 決済 */
document.querySelectorAll(".pay-btn").forEach(btn => {
  btn.onclick = () => {

    const pay = btn.dataset.pay;
    const amount = priceInput.value;

    if (!amount) return;

    clearTimeout(timer);

    toastText.textContent = `${pay}で保存（2秒後）`;
    toast.classList.add("show");

    timer = setTimeout(() => {
      save(pay, amount);
    }, 2000);
  };
});

/* 戻る */
undo.onclick = () => {
  clearTimeout(timer);
  toast.classList.remove("show");
};

/* 保存 */
function save(pay, amount) {

  const data = JSON.parse(localStorage.getItem("taxi") || "[]");

  data.push({
    amount: amount,
    pay: pay,
    time: new Date().toISOString()
  });

  localStorage.setItem("taxi", JSON.stringify(data));

  toast.classList.remove("show");

  state = "idle";
  priceInput.value = "";
  updateUI();
}

/* 初期 */
updateUI();
</script>

</body>
</html>
